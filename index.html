<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-title" content="Learning Zone">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Learning Zone</title>
<style>
:root{
  --bg:#ffffff; --bg2:#f2f7ff; --panel:#ffffff; --panel2:#e9f2ff;
  --gold:#f5a623; --gold-bright:#ffc94d; --gold-dim:#e09b1a;
  --red:#ff6b4a; --green:#3bb273; --blue:#4aa3e0; --cream:#1f3c70;
  --ink:#1f3c70; --ink-dim:#6f88ad;
  --kente:repeating-linear-gradient(90deg,#f5a623 0 14px,#ff6b4a 14px 28px,#4aa3e0 28px 36px,#3bb273 36px 50px,#f5a623 50px 56px,#7c5cf0 56px 68px);
  --shadow:0 8px 28px rgba(80,130,210,.16);
  --radius:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,"SF Pro Rounded",BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  font-size:20px; line-height:1.45; overflow-x:hidden;
  background-image:radial-gradient(ellipse at 50% -10%, #e3efff 0%, var(--bg) 60%);
  min-height:100vh;
}
#topbar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;pointer-events:none}
#topbar .tb-btn{pointer-events:auto;background:var(--panel);border:2px solid #b9d4f3;color:var(--blue);border-radius:14px;min-width:52px;height:48px;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);padding:0 12px}
#topbar .tb-btn:active{transform:scale(.94)}
.kente-strip{height:8px;background:var(--kente);border-radius:4px;opacity:.9}
#app{max-width:980px;margin:0 auto;padding:74px 18px 40px;min-height:100vh}
h1,h2,h3{font-weight:800;letter-spacing:.2px}
h1{font-size:32px;color:#2d6fc0}
h2{font-size:26px;color:#2d6fc0}
h3{font-size:22px;color:var(--ink)}
.muted{color:var(--ink-dim);font-size:17px}
.card{background:var(--panel);border:2px solid #cfe0f7;border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
.card.gold{border-color:var(--gold)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#14365f;font-weight:800;font-size:22px;border:none;border-radius:16px;padding:16px 26px;cursor:pointer;box-shadow:0 4px 0 var(--gold-dim),var(--shadow);font-family:inherit}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--gold-dim)}
.btn.secondary{background:var(--panel2);color:#2d6fc0;box-shadow:0 4px 0 #b9d4f3,var(--shadow);border:2px solid #b9d4f3}
.btn.big{font-size:26px;padding:20px 34px;border-radius:20px}
.btn.danger{background:linear-gradient(180deg,#ff8a6e,var(--red));color:#fff;box-shadow:0 4px 0 #c14a2e}
.btn:disabled{opacity:.45;pointer-events:none}
.btn-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.center{text-align:center}
.spacer{height:18px}

/* ---------- Answer options ---------- */
.qtext{font-size:26px;font-weight:700;line-height:1.5;color:var(--ink)}
@media(min-width:700px){.qtext{font-size:30px}}
.opts{display:grid;grid-template-columns:1fr;gap:14px;margin-top:22px}
@media(min-width:640px){.opts{grid-template-columns:1fr 1fr}}
.opt{background:var(--panel2);border:3px solid #b9d4f3;border-radius:18px;padding:18px 20px;font-size:24px;font-weight:700;color:var(--ink);cursor:pointer;text-align:left;display:flex;align-items:center;gap:14px;font-family:inherit;transition:border-color .15s}
.opt .letter{background:var(--blue);color:#fff;border-radius:10px;min-width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.opt:active{border-color:var(--blue)}
.opt.correct{border-color:var(--green);background:#e7f7ee}
.opt.wrong{border-color:var(--red);background:#ffeae4}
.opt.dim{opacity:.4;pointer-events:none}

/* ---------- HUD ---------- */
.hud{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.hud .pill{background:var(--panel);border:2px solid #cfe0f7;border-radius:999px;padding:8px 16px;font-size:16px;font-weight:700;color:var(--ink-dim);display:flex;gap:8px;align-items:center}
.hud .pill b{color:#2d6fc0}
.dots{display:flex;gap:6px}
.dot{width:14px;height:14px;border-radius:50%;background:#d8e6fa}
.dot.on{background:var(--gold)}
.dot.bad{background:var(--red)}
.lvl-badge{background:linear-gradient(135deg,#4aa3e0,#2d6fc0);color:#fff;border-radius:999px;padding:8px 16px;font-weight:900;font-size:16px}

/* ---------- Overlay ---------- */
#overlay{position:fixed;inset:0;background:rgba(210,228,250,.78);z-index:100;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 16px;backdrop-filter:blur(5px)}
#overlay.show{display:flex}
.ov-card{background:var(--panel);border:3px solid var(--blue);border-radius:26px;max-width:680px;width:100%;padding:26px;box-shadow:var(--shadow);margin:auto;animation:pop .3s ease}
@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.teach-illus{font-size:88px;text-align:center;margin:14px 0;animation:bounceIn .45s ease}
@keyframes bounceIn{0%{transform:scale(.3)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.teach-text{font-size:24px;font-weight:700;text-align:center;color:var(--ink);min-height:80px}
.step-dots{display:flex;gap:8px;justify-content:center;margin:16px 0}
.step-dots .dot{width:12px;height:12px}

/* ---------- Stop sign ---------- */
.stopsign{width:150px;height:150px;background:var(--red);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:30px;clip-path:polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%);animation:shake .5s ease;border:6px solid #fff;letter-spacing:1px;box-shadow:var(--shadow)}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}

/* ---------- Ananse ---------- */
.ananse-wrap{display:flex;justify-content:center;position:relative}
.ananse-idle{position:fixed;bottom:14px;right:14px;z-index:40;width:92px;height:92px;pointer-events:none;animation:floaty 3.5s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.ananse-celebrate svg{animation:dance .6s ease-in-out infinite alternate}
@keyframes dance{from{transform:rotate(-7deg) translateY(0)}to{transform:rotate(7deg) translateY(-12px)}}

/* Cinematic spider entrance — slow push-in like the video */
.ananse-cinematic{animation:anansiZoom 8s ease-in-out infinite alternate}
@keyframes anansiZoom{from{transform:scale(1)}to{transform:scale(1.06)}}

/* Breathing animation — subtle body pulse */
.ananse-breathe{animation:breathe 3s ease-in-out infinite;transform-origin:center 140px}
@keyframes breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.03)}}

/* Floating dust motes — golden particles */
.dust-field{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:inherit}
.dust{position:absolute;width:4px;height:4px;border-radius:50%;background:radial-gradient(circle,rgba(255,215,0,0.8),rgba(255,180,50,0));animation:drift linear infinite}
@keyframes drift{0%{transform:translate(0,0) scale(0);opacity:0}10%{opacity:1;transform:scale(1)}90%{opacity:0.8}100%{transform:translate(var(--dx),var(--dy)) scale(0.3);opacity:0}}

/* Eye blink animation */
.ananse-eyes{animation:blink 4s ease-in-out infinite;transform-origin:center 88px}
@keyframes blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(0.1)}}

/* Warm glow behind spider */
.ananse-glow{position:absolute;inset:-20%;border-radius:50%;background:radial-gradient(circle,rgba(255,200,100,0.15),transparent 70%);animation:glowPulse 4s ease-in-out infinite;pointer-events:none}
@keyframes glowPulse{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:0.8;transform:scale(1.1)}}
.speech{background:#f7fbff;color:#1f3c70;border:3px solid var(--blue);border-radius:18px;padding:16px 20px;font-size:20px;font-weight:700;position:relative;margin-top:14px}
.speech:before{content:"";position:absolute;top:-15px;left:50%;transform:translateX(-50%);border:12px solid transparent;border-bottom-color:var(--blue);border-top:0}

/* ---------- Subject tiles ---------- */
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.subj-tile{border:3px solid #b9d4f3;border-radius:22px;padding:22px 16px;text-align:center;cursor:pointer;background:var(--panel2);font-family:inherit;color:var(--ink);box-shadow:var(--shadow)}
.subj-tile .ic{font-size:52px;display:block;margin-bottom:8px}
.subj-tile .nm{font-size:20px;font-weight:800}
.subj-tile:active{transform:scale(.96)}
.subj-tile.glow{border-color:var(--gold);box-shadow:0 0 24px rgba(245,166,35,.4)}

/* ---------- Trophy room ---------- */
.shelf{background:linear-gradient(180deg,#ddebff,#c5dcfb);border-radius:14px;border-bottom:10px solid #9cc0ed;padding:18px 12px 8px;margin-bottom:22px}
.shelf-label{font-size:15px;font-weight:800;color:#5d7fb0;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;padding-left:6px}
.shelf-row{display:flex;gap:10px;flex-wrap:wrap}
.trophy{width:84px;height:96px;background:var(--panel);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:2px solid #b9d4f3;padding:6px}
.trophy .t-ic{font-size:40px}
.trophy .t-lb{font-size:10px;color:var(--ink-dim);text-align:center;line-height:1.2;margin-top:4px;font-weight:700}
.trophy.silhouette{opacity:.4;filter:grayscale(1)}
.trophy:active{transform:scale(.93)}

/* ---------- 2K card ---------- */
.card2k{background:linear-gradient(160deg,#101720 0%,#1b2737 55%,#0d1117 100%);border:3px solid #3c5a82;border-radius:26px;padding:26px;color:#e8f0fa;box-shadow:var(--shadow)}
.card2k .ovr{font-size:84px;font-weight:900;color:#ffd97a;line-height:1;text-shadow:0 4px 18px rgba(255,217,122,.4)}
.card2k .ovr-lb{font-size:14px;letter-spacing:3px;color:#9db4d4;font-weight:800}
.statline{display:flex;justify-content:space-between;align-items:center;padding:12px 4px;border-bottom:1px solid #d8e6fa;font-size:19px}
.statline b{font-size:24px;color:#2d6fc0}
.card2k .statline{border-bottom:1px solid #28405e}
.card2k .statline b{color:#ffd97a}
.statbar{height:10px;border-radius:5px;background:#26344a;flex:1;margin:0 16px;overflow:hidden}
.statbar i{display:block;height:100%;background:linear-gradient(90deg,#5a93c4,#ffd97a);border-radius:5px}

/* ---------- Parent dashboard ---------- */
.insight{border-left:6px solid var(--gold);padding:14px 16px;background:var(--panel2);border-radius:0 14px 14px 0;margin-bottom:12px;font-size:18px}
.insight.warn{border-left-color:var(--red)}
.insight.good{border-left-color:var(--green)}
input,select{font-family:inherit;font-size:20px;background:var(--bg2);color:var(--ink);border:2px solid #b9d4f3;border-radius:12px;padding:12px 14px;width:100%}
input:focus,select:focus{outline:none;border-color:var(--blue)}
label{font-size:16px;font-weight:700;color:var(--ink-dim);display:block;margin:14px 0 6px}
.pin-display{display:flex;gap:12px;justify-content:center;margin:18px 0}
.pin-digit{width:54px;height:64px;border:3px solid #b9d4f3;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;background:var(--bg2);color:var(--ink)}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px;justify-content:center}
.pin-pad button{height:64px;border-radius:16px;font-size:26px;font-weight:800;background:var(--panel);color:var(--ink);border:2px solid #b9d4f3;cursor:pointer;font-family:inherit;box-shadow:var(--shadow)}
.pin-pad button:active{background:var(--blue);color:#fff}

/* ---------- Misc ---------- */
.bar{height:16px;background:var(--panel2);border-radius:8px;overflow:hidden;border:1px solid #cfe0f7}
.bar i{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,var(--gold-dim),var(--gold-bright))}
.confetti{position:fixed;top:-20px;font-size:26px;z-index:200;animation:fall linear forwards;pointer-events:none}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;font-weight:900;font-size:20px;padding:14px 26px;border-radius:999px;z-index:300;box-shadow:var(--shadow);animation:pop .3s ease}
.profile-tile{display:flex;align-items:center;gap:16px;width:100%;text-align:left;margin-bottom:12px}
.break-timer{font-size:64px;font-weight:900;color:#2d6fc0;text-align:center;font-variant-numeric:tabular-nums}
.adinkra-divider{display:flex;align-items:center;gap:14px;margin:22px 0;color:var(--blue)}
.adinkra-divider:before,.adinkra-divider:after{content:"";flex:1;height:2px;background:#cfe0f7}
.fadein{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.report-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.report-row .rn{min-width:150px;font-weight:800;font-size:18px}

/* ---------- Fable 5: focus mode (max 3 elements, clean bg) ---------- */
body.focus{background:#fcfdff;background-image:none}
body.focus #anansecorner{display:none}
.focus-chip{display:inline-block;background:var(--panel2);border:2px solid #cfe0f7;border-radius:999px;padding:6px 16px;font-size:15px;font-weight:800;color:#5d7fb0;margin:0 auto 16px}
.focus-wrap{max-width:620px;margin:0 auto}

/* ---------- Fable 5: scratchpad ---------- */
.scratch{margin:18px 0 6px;border:3px dashed #c2b079;border-radius:18px;background:#fffdf4;padding:10px}
.scratch .sc-top{display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:800;color:#9a7d27;margin-bottom:6px}
.scratch canvas{width:100%;height:150px;border-radius:12px;background:#fffef9;touch-action:none;display:block;border:1px solid #ece0bd}
.sc-btn{background:#f3ead0;border:2px solid #d9c486;color:#7a611c;border-radius:10px;font-size:14px;font-weight:800;padding:6px 12px;cursor:pointer;font-family:inherit}

/* ---------- Fable 5: manipulatives (coins / counters) ---------- */
.manip{margin:14px 0;border:2px solid #cfe0f7;border-radius:16px;background:#f7fbff;padding:12px}
.manip .m-lab{font-size:15px;font-weight:800;color:#5d7fb0;margin-bottom:8px}
.manip-mat{position:relative;min-height:120px;border-radius:12px;background:repeating-linear-gradient(45deg,#eef5ff 0 12px,#e7f0fd 12px 24px);overflow:hidden;touch-action:none}
.token{position:absolute;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;cursor:grab;user-select:none;box-shadow:0 3px 8px rgba(60,90,150,.25);touch-action:none}
.token.coin{color:#5a4410}
.token:active{cursor:grabbing;transform:scale(1.08)}
.m-count{font-size:16px;font-weight:800;color:#2d6fc0;margin-top:8px;text-align:right}

/* ---------- Fable 5: one-instruction checklist ---------- */
.microlist{list-style:none;margin:14px 0;padding:0;text-align:left;max-width:420px;margin-left:auto;margin-right:auto}
.microlist li{display:flex;align-items:center;gap:10px;font-size:17px;color:#9db0c8;padding:6px 0}
.microlist li.done{color:#2d6fc0;font-weight:700}
.microlist li .chk{width:26px;height:26px;border-radius:50%;border:2px solid #cfe0f7;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.microlist li.done .chk{background:var(--green);border-color:var(--green);color:#fff}
.micro-now{background:#eef6ff;border:3px solid var(--blue);border-radius:16px;padding:16px;font-size:21px;font-weight:700;color:var(--ink);margin:6px 0 14px}
.micro-confirm{background:linear-gradient(180deg,#5fcf8f,var(--green));color:#fff;font-weight:800;font-size:20px;border:none;border-radius:14px;padding:14px 24px;cursor:pointer;font-family:inherit;box-shadow:0 4px 0 #2f8f5a}
.micro-confirm:active{transform:translateY(3px);box-shadow:0 1px 0 #2f8f5a}

/* ---------- Fable 5: animated 2K stat bars + level-up hero ---------- */
.statbar i{transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
.stat2{display:flex;align-items:center;gap:12px;padding:10px 2px;border-bottom:1px solid #28405e}
.stat2 .s-nm{font-size:15px;color:#cfe0fa;min-width:128px;font-weight:700}
.stat2 .s-bar{flex:1;height:12px;background:#26344a;border-radius:6px;overflow:hidden}
.stat2 .s-bar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,#5a93c4,#ffd97a);width:0;transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
.stat2 .s-val{font-size:22px;font-weight:900;color:#ffd97a;min-width:40px;text-align:right}
.stat2.growth .s-nm:after{content:" ▲";color:#5fcf8f;font-size:12px}
.hero-pop{animation:heroPop .6s ease}
@keyframes heroPop{0%{transform:scale(.4);opacity:0}55%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}

/* ---------- Fable 5: pattern tiles ---------- */
.pat-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:18px 0}
.pat-cell{width:74px;height:74px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;background:var(--panel2);border:3px solid #b9d4f3;color:var(--ink)}
.pat-cell.q{background:#fff;border-style:dashed;border-color:var(--gold);color:var(--gold)}
.swatch{width:74px;height:74px;border-radius:16px;border:3px solid rgba(0,0,0,.12)}
.readbtn{background:var(--panel2);border:2px solid #b9d4f3;color:#2d6fc0;border-radius:12px;font-size:16px;font-weight:800;padding:8px 16px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="topbar">
  <button class="tb-btn" id="homeBtn" onclick="goHome()" title="Home">🏠</button>
  <button class="tb-btn" id="usersBtn" onclick="exitToProfiles()" title="Switch learner">👥</button>
  <button class="tb-btn" id="soundBtn" onclick="toggleSound()" title="Sound">🔊</button>
</div>
<div id="app"></div>
<div id="overlay"></div>
<div id="anansecorner"></div>
<script>
"use strict";
/* ============================================================
   PRINCE'S LEARNING ZONE — offline adaptive learning app
   Ananse the Wise Spider · Ghanaian theme · ADHD-friendly
   ============================================================ */

/* ---------- helpers ---------- */
const $=id=>document.getElementById(id);
const app=$("app"), overlay=$("overlay");
const rnd=n=>Math.floor(Math.random()*n);
const pick=a=>a[rnd(a.length)];
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]]}return a};
const today=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
const addDays=(iso,n)=>{const d=new Date(iso+"T12:00:00");d.setDate(d.getDate()+n);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
const dayOfYear=()=>{const d=new Date();return Math.floor((d-new Date(d.getFullYear(),0,0))/864e5)};
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmtTime=ms=>{const s=Math.max(0,Math.ceil(ms/1000));return Math.floor(s/60)+":"+String(s%60).padStart(2,"0")};

/* ---------- persistent storage ---------- */
const DBKEY="plz_v1";
function defaultDB(){return{profiles:[],pin:null,sound:true,telegram:{token:"",chat:"",time:"19:00",lastSent:""}}}
let DB; try{DB=JSON.parse(localStorage.getItem(DBKEY))||defaultDB()}catch(e){DB=defaultDB()}
function save(){try{localStorage.setItem(DBKEY,JSON.stringify(DB))}catch(e){}}
let P=null; // active profile
let S=null; // active session

function newProfile(name,avatar){return{
  id:Date.now()+""+rnd(999),name,avatar,color:null,pin:null,created:today(),
  levels:{math:1,english:1,comprehension:1,science:1,history:1},
  diagDone:false,diag:null,
  trophies:[],streak:0,bestStreak:0,xp:0,
  stats:{speed:90,reading:80,memory:72,strategy:42,recall:38},
  sessions:[],sm2:{},wrongLog:[],
  daily:{date:"",done:false,ok:false},
  weeklyGoal:{topic:"",set:""},
  alertLog:{},
  askedAt:{}
}}

/* ---------- text-to-speech (Ananse's voice) ---------- */
let ananseVoice=null, speaking=null;
function pickVoice(){
  if(!("speechSynthesis" in window))return;
  const vs=speechSynthesis.getVoices();
  // Best voices for Ananse — warm, expressive, reliable
  ananseVoice=vs.find(v=>v.name.includes('Samantha')&&v.lang.startsWith('en-US'))
           ||vs.find(v=>v.name.includes('Daniel')&&v.lang.startsWith('en-GB'))

async function say(text) {
  if (!DB.sound) return;
  text = text.replace(/[*_#]/g, "");
  if (!("speechSynthesis" in window)) return;
  
  // Cancel any in-progress speech
  speechSynthesis.cancel();
  
  // Wait for voices to load (Chrome loads them async, empty until onvoiceschanged)
  let retries=0;
  while(speechSynthesis.getVoices().length===0 && retries<20){
    await new Promise(r=>setTimeout(r,100));
    retries++;
  }
  
  const msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.9;
  msg.pitch = 1.05;
  
  // Try to use the pre-picked voice, fall back to first available
  if(ananseVoice && speechSynthesis.getVoices().some(v=>v.voiceURI===ananseVoice.voiceURI)){
    msg.voice=ananseVoice;
  }else{
    const vs=speechSynthesis.getVoices();
    msg.voice=vs.find(v=>v.lang.startsWith('en')&&v.localService)||vs[0];
  }
  
  // Keep a reference to prevent Chrome GC bug (causes humming)
  speaking=msg;
  msg.onend=msg.onerror=()=>{speaking=null;};
  
  speechSynthesis.speak(msg);
}

/* ---------- sound engine (Web Audio synthesis — rich game sounds) ---------- */
let _ac=null,_ambient=null,_noiseBuf=null;
function audioCtx(){
  if(typeof window==="undefined")return null;
  if(_ac)return _ac;
  try{const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return null;_ac=new AC();}catch(e){return null;}
  return _ac;
}
function _resume(){const a=audioCtx();if(a&&a.state==="suspended"){try{a.resume();}catch(e){}}}

// ── helpers ──

// reusable white-noise buffer (2 sec)
function _noiseBufGet(){
  const a=audioCtx();if(!a)return null;
  if(!_noiseBuf){_noiseBuf=a.createBuffer(1,a.sampleRate*2,a.sampleRate);
    const d=_noiseBuf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;}
  return _noiseBuf;
}

// play a filtered noise burst → {src,g,f} or null
function _noiseHit(durSec,vol,freq,Q){
  const a=audioCtx(),buf=_noiseBufGet();if(!a||!buf)return;
  const src=a.createBufferSource();src.buffer=buf;
  const g=a.createGain(),f=a.createBiquadFilter();
  f.type="bandpass";f.frequency.value=freq||2000;f.Q.value=Q||0.8;
  src.connect(f);f.connect(g);g.connect(a.destination);
  const t=a.currentTime,d=durSec||0.12;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.12,t+0.004);
  g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  src.start(t);src.stop(t+d+0.02);
}

// noise sweep (bandpass slides from freq→freq2)
function _noiseSweep(durSec,vol,freq,freq2,Q){
  const a=audioCtx(),buf=_noiseBufGet();if(!a||!buf)return;
  const src=a.createBufferSource();src.buffer=buf;
  const g=a.createGain(),f=a.createBiquadFilter();
  f.type="bandpass";f.frequency.value=freq||400;f.Q.value=Q||1.2;
  src.connect(f);f.connect(g);g.connect(a.destination);
  const t=a.currentTime,d=durSec||0.2;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.1,t+0.006);
  g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  f.frequency.linearRampToValueAtTime(freq2||2000,t+d*0.6);
  src.start(t);src.stop(t+d+0.02);
}

// rich tone: oscillator + optional harmonics + subtle spread
function _tone(freq,start,dur,type,vol,harmonics){
  const a=audioCtx();if(!a)return;
  const t=a.currentTime+(start||0),d=dur||0.15;
  const o=a.createOscillator(),og=a.createGain();
  o.type=type||"sine";o.frequency.value=freq;
  og.gain.setValueAtTime(0,t);og.gain.linearRampToValueAtTime(vol||0.12,t+0.006);
  og.gain.exponentialRampToValueAtTime(0.0001,t+d);
  o.connect(og);og.connect(a.destination);
  o.start(t);o.stop(t+d+0.03);
  // harmonic overtones
  if(harmonics){harmonics.forEach(h=>{
    const o2=a.createOscillator(),g2=a.createGain();
    o2.type="sine";o2.frequency.value=freq*h;
    g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(vol*0.35,t+0.005);
    g2.gain.exponentialRampToValueAtTime(0.0001,t+d*0.7);
    g2.connect(a.destination);o2.connect(g2);
    o2.start(t);o2.stop(t+d*0.7+0.02);
  });}
}

// multi-tap delay spread (adds spaciousness)
function _spread(dryGain,amount){
  const a=audioCtx();if(!a)return;
  const wet=a.createGain();wet.gain.value=amount||0.08;
  [0.019,0.031,0.047,0.063].forEach(d=>{
    const dl=a.createDelay(0.08);dl.delayTime.value=d;
    const lp=a.createBiquadFilter();lp.type="lowpass";lp.frequency.value=2800;
    const g=a.createGain();g.gain.value=0.18;
    dryGain.connect(dl);dl.connect(lp);lp.connect(g);g.connect(wet);
  });
  wet.connect(a.destination);
}

// bell / chime: bright with harmonics + spread
function _chime(freq,start,dur,vol){
  const a=audioCtx();if(!a)return;
  const t=a.currentTime+(start||0),d=dur||0.22;
  const o=a.createOscillator(),og=a.createGain();
  o.type="sine";o.frequency.value=freq;
  og.gain.setValueAtTime(0,t);og.gain.linearRampToValueAtTime(vol||0.1,t+0.004);
  og.gain.exponentialRampToValueAtTime(0.0001,t+d);
  o.connect(og);og.connect(a.destination);
  // octave + octave+fifth harmonics for bell character
  [2,3,4.8].forEach(h=>{
    const o2=a.createOscillator(),g2=a.createGain();
    o2.type="sine";o2.frequency.value=freq*h;
    g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(vol*0.28,t+0.003);
    g2.gain.exponentialRampToValueAtTime(0.0001,t+d*0.6);
    g2.connect(a.destination);o2.connect(g2);
    o2.start(t);o2.stop(t+d*0.6+0.02);
  });
  _spread(og,vol*0.6);
  o.start(t);o.stop(t+d+0.04);
}

// percussive thump: noise attack + sine body
function _thump(freq,start,dur,vol){
  const a=audioCtx();if(!a)return;
  const t=a.currentTime+(start||0),d=dur||0.14;
  _noiseHit(d*0.5,vol*0.5,freq*5||500,1.8); // crack layer
  const o=a.createOscillator(),g=a.createGain();
  o.type="sine";o.frequency.value=freq||100;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.2,t+0.002);
  g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  g.connect(a.destination);o.connect(g);
  o.start(t);o.stop(t+d+0.02);
}

// ── sfx dispatcher ──

function sfx(name){
  if(!DB.sound)return;
  const a=audioCtx();if(!a)return;_resume();
  const t=a.currentTime;
  switch(name){

    // ✨ CORRECT — bright ascending chime
    case "correct":
      _chime(523,0,0.16,0.12);         // C5
      _chime(659,0.05,0.16,0.12);      // E5
      _chime(784,0.10,0.24,0.14);      // G5  (rings longer)
      break;

    // 😔 WRONG — gentle low thud + descending tone (not punishing)
    case "wrong":
      _thump(100,0,0.14,0.14);
      _tone(180,0.03,0.16,"triangle",0.07);
      _tone(140,0.08,0.18,"triangle",0.05);
      break;

    // 🎉 LEVELUP — triumphant ascending arpeggio with climax sparkle
    case "levelup":
      _chime(523,t,0.12,0.10);
      _chime(659,t+0.07,0.12,0.10);
      _chime(784,t+0.14,0.13,0.11);
      _chime(1047,t+0.21,0.32,0.15);
      // sparkle burst at end
      setTimeout(()=>{if(!audioCtx())return;const t2=audioCtx().currentTime;
        _chime(1319,t2,0.16,0.07);_chime(1568,t2+0.03,0.18,0.06);
        _chime(1760,t2+0.06,0.20,0.05);
      },260);
      break;

    // 🥳 CELEBRATE — rich chord fanfare + shimmer
    case "celebrate":
      [523,659,784,1047].forEach((f,i)=>{
        _tone(f,t+i*0.03,0.42,"sine",0.08,[2,3]);});
      _noiseHit(0.32,0.05,3200,0.6); // shimmer
      setTimeout(()=>{if(!audioCtx())return;const t2=audioCtx().currentTime;
        _chime(1319,t2,0.20,0.06);_chime(1568,t2+0.04,0.22,0.05);
      },150);
      break;

    // 🥁 DRUM — actual percussive hit
    case "drum":
      _thump(85,0,0.14,0.20);
      _thump(105,0.03,0.12,0.10);
      break;

    // ✅ TICK — crisp short snap
    case "tick":
      _tone(1400,0,0.03,"square",0.05);
      _noiseHit(0.025,0.05,2800,1.2);
      break;

    // 💨 SWISH — filtered noise sweep (actual swoosh)
    case "swish":
      _noiseSweep(0.16,0.08,450,2200,0.9);
      break;

    // 🫧 POP — bright bubble pop
    case "pop":
      _tone(700,0,0.05,"sine",0.08,[2,4]);
      _tone(1050,0.008,0.06,"sine",0.05);
      break;

    // 🪙 COINS — quick ascending coin collect
    case "coins":
      _chime(784,t,0.07,0.08);
      _chime(988,t+0.04,0.07,0.09);
      _chime(1319,t+0.08,0.10,0.10);
      break;

    // 🔥 STREAK — extra sparkle on top of correct
    case "streak":
      _chime(1047,t,0.14,0.09);
      _chime(1319,t+0.05,0.16,0.09);
      _chime(1568,t+0.10,0.20,0.07);
      break;
  }
}
// ambient focus loop (gentle, low) — used during reading/story
function ambientStart(){
  if(!DB.sound)return;const a=audioCtx();if(!a||_ambient)return;_resume();
  try{
    const o=a.createOscillator(),o2=a.createOscillator(),g=a.createGain();
    o.type="sine";o.frequency.value=196;o2.type="sine";o2.frequency.value=294;
    g.gain.value=0.0001;g.gain.linearRampToValueAtTime(0.05,a.currentTime+1.5);
    o.connect(g);o2.connect(g);g.connect(a.destination);o.start();o2.start();
    _ambient={o,o2,g};
  }catch(e){}
}
function ambientStop(){
  if(!_ambient)return;const a=audioCtx();
  try{_ambient.g.gain.linearRampToValueAtTime(0.0001,a.currentTime+0.8);
    const amb=_ambient;setTimeout(()=>{try{amb.o.stop();amb.o2.stop();}catch(e){}},900);
  }catch(e){}
  _ambient=null;
}

function numOpts(ans,spread){ // build 4 unique numeric options
  const set=new Set([ans]);
  let guard=0;
  while(set.size<4&&guard++<60){
    let d=ans+(rnd(2)?1:-1)*(1+rnd(spread));
    if(d>=0&&!set.has(d))set.add(d);
  }
  while(set.size<4)set.add(ans+set.size*3+1);
  const opts=shuffle([...set]);
  return {opts:opts.map(String),a:opts.indexOf(ans)};
}
function moneyOpts(ans){ // cents
  const set=new Set([ans]);let g=0;
  while(set.size<4&&g++<60){let d=ans+(rnd(2)?1:-1)*pick([5,10,25]);if(d>0&&!set.has(d))set.add(d)}
  const arr=shuffle([...set]);
  const fmt=c=>c>=100?("$"+(c/100).toFixed(2)):(c+"¢");
  return {opts:arr.map(fmt),a:arr.indexOf(ans)};
}

const ALL_TOPICS=(()=>{const t=new Set();
  for(const s of ["reading","science","history"])for(let l=1;l<=5;l++)BANK[s][l].forEach(q=>t.add(q.topic));
  ["addition","subtraction","multiplication","division","fractions","place value","money","rounding","area","word problems","order of operations"].forEach(x=>t.add(x));
  return [...t];})();

function topicSubject(topic){
  if(["addition","subtraction","multiplication","division","fractions","place value","money","rounding","area","word problems","order of operations","math"].includes(topic))return "math";
  if(ENGLISH_TOPICS.includes(topic))return "english";
  if(["inference","story structure","comprehension","figurative language"].includes(topic))return "comprehension";
  if(["space","animals","human body","how things work"].includes(topic))return "science";
  return "history";
}

function getQuestion(subject,lvl){
  lvl=Math.max(1,Math.min(5,lvl));
  if(subject==="math"){
    // weekly goal weighting for math topics
    const goal=P&&P.weeklyGoal.topic;
    if(goal&&topicSubject(goal)==="math"&&Math.random()<0.5){
      for(let tries=0;tries<8;tries++){const q=genMath(lvl);if(q.topic===goal)return q}
    }
    return genMath(lvl);
  }
  let pool=BANK[subject][lvl].slice();
  const goal=P&&P.weeklyGoal.topic;
  if(goal&&Math.random()<0.5){
    const gp=pool.filter(q=>q.topic===goal);
    if(gp.length)pool=gp;
  }
  // prefer least-recently asked
  pool.sort((x,y)=>{
    const ix="b_"+subject+lvl+"_"+BANK[subject][lvl].indexOf(x), iy="b_"+subject+lvl+"_"+BANK[subject][lvl].indexOf(y);
    return (P.askedAt[ix]||0)-(P.askedAt[iy]||0)||Math.random()-0.5;
  });
  const q=Object.assign({},pool[0]);
  q.id="b_"+subject+lvl+"_"+BANK[subject][lvl].indexOf(pool[0]);
  P.askedAt[q.id]=Date.now();
  q.subject=subject;q.level=lvl;
  return q;
}
/* build one question for a specific topic (used by opening review #6) */
function questionForTopic(topic){
  const subj=topicSubject(topic);
  const lvl=Math.max(1,Math.min(5,(P&&P.levels[subj])||1));
  if(subj==="math"){
    if(topic==="word problems")return genWordProblem();
    for(let i=0;i<12;i++){const q=genMath(lvl);if(q.topic===topic)return q;}
    return genMath(lvl);
  }
  const bank=BANK[subj]&&BANK[subj][lvl]?BANK[subj][lvl]:null;
  if(!bank)return null;
  const pool=bank.filter(q=>q.topic===topic);
  const src=pool.length?pool:bank;
  const q=Object.assign({},pick(src));
  q.subject=subj;q.level=lvl;
  return q;
}
/* 2–3 warm-up questions from previously-seen (due) topics; intervention topics first;
   decoding/spelling capped to at most 1 (#6, #13) */
function buildReview(subject){
  if(!P)return[];
  const due=topicsDue();
  if(!due.length)return[];
  const PRIORITY=["word problems","comprehension","story structure","inference"];
  const ordered=due.slice().sort((a,b)=>{
    const pa=PRIORITY.indexOf(a),pb=PRIORITY.indexOf(b);
    return (pa<0?9:pa)-(pb<0?9:pb)||Math.random()-0.5;
  });
  const out=[];let englishUsed=0;
  for(const t of ordered){
    if(out.length>=3)break;
    if(topicSubject(t)==="english"){if(englishUsed>=1)continue;englishUsed++;}
    const q=questionForTopic(t);
    if(q){q.review=true;out.push(q);}
  }
  return out.slice(0,3);
}

/* ---------- SM2 spaced repetition ---------- */
// Priority intervention topics: keep them coming back often — cap the interval (#6).
// (Core SM-2 formula is untouched; we only clamp the resulting interval.)
const SM2_CAP={"word problems":3,"comprehension":3,"story structure":3,"inference":4};
function sm2Update(topic,quality){ // quality 0-5
  if(!P)return;
  const s=P.sm2[topic]||{ef:2.5,int:0,reps:0,due:today(),right:0,wrong:0};
  if(quality>=3){
    s.int=s.reps===0?1:(s.reps===1?6:Math.round(s.int*s.ef));
    s.reps++;s.right++;
  }else{
    s.reps=0;s.int=1;s.wrong++;
  }
  s.ef=Math.max(1.3,s.ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02)));
  if(SM2_CAP[topic]&&s.int>SM2_CAP[topic])s.int=SM2_CAP[topic]; // interval cap for intervention topics
  s.due=addDays(today(),s.int);
  P.sm2[topic]=s;
}
function topicsDue(){
  if(!P)return[];
  const t=today();
  return Object.entries(P.sm2).filter(([k,v])=>v.due<=t).map(([k])=>k);
}

/* ---------- session ---------- */
function startSession(subject){
  S={subject,total:10,n:0,correct:0,results:[],consecR:0,consecW:0,
     sprintEnd:Date.now()+10*60*1000,qStart:0,cur:null,brokeAt:new Set(),xp:0,mode:"session",
     start:Date.now(),wpC:0,wpT:0,recallC:0,recallT:0,reviewC:0,reviewT:0,mfC:0,mfT:0,wpServed:false,phase:"main",seen:[]};
  // #6: open with 2–3 review questions from earlier sessions
  const review=buildReview(subject);
  if(review.length){
    S.reviewQ=review;S.reviewIdx=0;S.phase="review";S.total=10+review.length;
    say("First, a quick warm-up from what we learned before. Then we play "+SUBJECTS[subject].name+"!");
    nextQuestion();
    return;
  }
  if(subject==="comprehension"){
    say("Story time! Read carefully, then I will quiz you like a detective.");
    showStory();
    return;
  }
  if(subject==="history")sfx("drum");
  say("Let's play "+SUBJECTS[subject].name+"! Take your time and think it through.");
  nextQuestion();
}
// regenerate a question until it isn't one we've shown recently this session (no repeats)
function freshQuestion(genFn){
  let q=genFn(),tries=0;
  while(q&&q.q&&S&&S.seen&&S.seen.includes(q.q)&&tries<14){q=genFn();tries++;}
  return q;
}
function nextQuestion(){
  if(S.n>=S.total)return endSession();
  // #6: serve opening warm-up review questions first
  if(S.phase==="review"){
    if(S.reviewQ&&S.reviewIdx<S.reviewQ.length){
      S.cur=S.reviewQ[S.reviewIdx];S.reviewIdx++;renderQuestion();return;
    }
    S.phase="main";
    if(S.subject==="comprehension"){showStory();return;}
  }
  if(S.subject==="comprehension"){
    if(S.storyQs&&S.storyIdx<S.storyQs.length){
      const q=Object.assign({},S.storyQs[S.storyIdx]);S.storyIdx++;
      q.level=S.storyLvl;q.subject="comprehension";
      S.cur=q;renderQuestion();return;
    }
    return showStory();
  }
  const lvl=P.levels[S.subject];
  // #1: guarantee at least one word problem every math session (single-step first)
  if(S.subject==="math"&&!S.wpServed&&S.phase!=="review"&&(S.n>=2||S.n>=S.total-1)){
    S.wpServed=true;
    S.cur=freshQuestion(genWordProblem);
    renderQuestion();return;
  }
  S.cur=freshQuestion(()=>getQuestion(S.subject,lvl));
  renderQuestion();
}

/* ---------- scratchpad (#4) ---------- */
function scratchHTML(){
  return '<div class="scratch"><div class="sc-top"><span>✏️ Scratchpad — work it out here</span>'
    +'<button class="sc-btn" onclick="scratchClear()">↺ Clear</button></div>'
    +'<canvas id="scpad" width="600" height="180"></canvas></div>';
}
let _scctx=null,_scdraw=false;
function initScratch(){
  const c=$("scpad");if(!c||!c.getContext)return;
  _mtot=0;_mcount=0;
  const ctx=c.getContext("2d");_scctx=ctx;
  ctx.lineWidth=3;ctx.lineCap="round";ctx.strokeStyle="#1B4332";
  const pos=e=>{const r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(c.width/r.width),y:(t.clientY-r.top)*(c.height/r.height)};};
  const down=e=>{_scdraw=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();};
  const move=e=>{if(!_scdraw)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();e.preventDefault();};
  const up=()=>{_scdraw=false;};
  c.addEventListener("pointerdown",down);c.addEventListener("pointermove",move);
  c.addEventListener("pointerup",up);c.addEventListener("pointerleave",up);
}
function scratchClear(){const c=$("scpad");if(c&&c.getContext)c.getContext("2d").clearRect(0,0,c.width,c.height);}
function answer(pos){
  const q=S.cur;
  let leveledUp=false;
  const elapsed=Date.now()-S.qStart;
  const chosen=S.order[pos];
  const correct=chosen===q.a;
  // lock options, show feedback
  S.order.forEach((oi,p)=>{
    const b=$("opt"+p);if(!b)return;
    if(oi===q.a)b.classList.add("correct");
    else if(p===pos&&!correct)b.classList.add("wrong");
    else b.classList.add("dim");
    b.onclick=null;
  });
  S.n++;
  S.results.push({topic:q.topic,correct,level:q.level,ms:elapsed});
  // intervention metric tracking (#15)
  if(S.phase==="review"){S.reviewT++;if(correct)S.reviewC++;}
  if(isWordProblem(q)){S.wpT++;if(correct)S.wpC++;}
  if(isRecall(q)||S.subject==="comprehension"){S.recallT++;if(correct)S.recallC++;}
  if(isMathFacts(q)){S.mfT++;if(correct)S.mfC++;}
  sm2Update(q.topic,correct?(elapsed<15000?5:4):2);
  if(correct){
    S.correct++;S.consecR++;S.consecW=0;
    S.xp+=10*q.level;P.xp+=10*q.level;
    P.streak++;if(P.streak>P.bestStreak)P.bestStreak=P.streak;
    checkStreakTrophy();
    growStats(q,true);
    if(S.consecR>=2){if(P.levels[S.subject]<5){P.levels[S.subject]++;leveledUp=true}S.consecR=0}
  }else{
    S.consecW++;S.consecR=0;P.streak=0;
    P.wrongLog.push({date:today(),topic:q.topic,subject:S.subject});
    growStats(q,false);
    if(S.consecW>=2){if(P.levels[S.subject]>1){P.levels[S.subject]--;toast("Let's build it back up — Level "+P.levels[S.subject])}S.consecW=0}
  }
  save();
  // let the green/red highlight show on the tapped option BEFORE any overlay covers it
  if(correct){
    sfx("correct");
    const praise=pick(CORRECT_PRAISE);
    say("Correct! "+praise);
    if(leveledUp){
      setTimeout(()=>{
        heroMoment({title:"LEVEL UP!",sub:LEVEL_NAMES[P.levels[S.subject]]+" unlocked!",mood:"party",sound:"levelup",hold:2800});
        setTimeout(()=>{closeOverlay();nextQuestion();},2900);
      },750);
    }else{
      setTimeout(()=>{
        openOverlay('<div class="center"><div class="teach-illus">🎯</div><h2>'+(q.level>=4?"Big-time play!":"Swish!")+'</h2><div class="speech">'+esc(praise)+'</div><div class="spacer"></div><button class="btn big" onclick="closeOverlay();nextQuestion()">Next ▶</button></div>');
      },800);
    }
  }else{
    sfx("wrong");
    const enc=pick(TRY_AGAIN);
    say(enc+" Let me show you how, step by step.");
    setTimeout(()=>{startTeaching(enc);},900);
  }
}
/* ---------- 2K stat growth hooks (#9) ---------- */
function isMathFacts(q){
  if(!q||!S)return false;
  const t=(q.topic||"").toLowerCase();
  return S.subject==="math"&&/addition|subtraction|multiplication|division|place value|order of operations|rounding|times table|number/.test(t)&&!/word problem/.test(t);
}
function isWordProblem(q){return q&&/word problem/i.test(q.topic||"")}
function isRecall(q){return q&&/recall|sequence|comprehension|story/i.test(q.topic||"")}
function growStats(q,correct){
  if(!P.stats)P.stats={speed:90,reading:80,memory:72,strategy:42,recall:38};
  const st=P.stats, clamp=k=>{if(st[k]>99)st[k]=99;if(st[k]<1)st[k]=1};
  const before={strategy:st.strategy,recall:st.recall};
  if(correct){
    if(isWordProblem(q)){st.strategy+=2;clamp("strategy")}
    if(isRecall(q)||S.subject==="comprehension"){st.recall+=2;clamp("recall")}
    if(S.subject==="english"){st.reading+=1;clamp("reading")}
    if(/sequence|memory|inference/i.test(q.topic||"")){st.memory+=1;clamp("memory")}
    if(isMathFacts(q)&&(Date.now()-S.qStart)<6000){st.speed+=1;clamp("speed")}
    // celebrate when an intervention stat crosses a 10-point milestone (#16)
    ["strategy","recall"].forEach(k=>{
      if(Math.floor(st[k]/10)>Math.floor(before[k]/10)&&typeof fireCelebration==="function")
        fireCelebration("milestone",k.toUpperCase()+" "+(Math.floor(st[k]/10)*10));
    });
  }
}

function brainBreak(){
  clearTimers();
  S.brokeAt.add(S.n);

  breakEnd=Date.now()+3*60*1000;
  const started=Date.now();
  openOverlay('<div class="center">'
   +'<h2>🧠 Brain Break!</h2>'
   +'<p class="muted">Your brain grows while your body moves. 3 minutes!</p>'
   +'<div class="teach-illus">'+act.ic+'</div>'

   +'<div class="break-timer" id="btimer">3:00</div>'
   +'<div class="spacer"></div>'
   +'<button class="btn big" id="breakDone" onclick="endBreak()" disabled>I\'m ready! ▶</button>'
   +'<div class="spacer"></div>'
   +'<button class="btn secondary" id="breakSkip" style="display:none;font-size:15px;padding:8px 16px" onclick="endBreak()">Skip break</button>'
   +'</div>');
  say("Brain break time! "+act.t);
  breakInt=setInterval(()=>{
    const left=breakEnd-Date.now();
    const el=$("btimer");if(el)el.textContent=fmtTime(left);
    if(Date.now()-started>20000){const sk=$("breakSkip");if(sk)sk.style.display="inline-flex"}
    if(left<=0){const b=$("breakDone");if(b)b.disabled=false;const el2=$("btimer");if(el2)el2.textContent="0:00";clearInterval(breakInt);say("Break is done! Ready to keep going?")}
  },300);
}
function endBreak(){
  if(breakInt){clearInterval(breakInt);breakInt=null}

/* ---------- session end ---------- */

var hoopInt=null,H=null;
function startHoops(){
  clearTimers();closeOverlay();showAnanseCorner(false);
  if(hoopInt){clearInterval(hoopInt);hoopInt=null}
  H={shot:0,made:0,pos:0,dir:1,live:true};
  app.innerHTML='<div class="fadein center" style="max-width:480px;margin:0 auto">'
   +'<h1>🏀 Bonus Hoops!</h1>'
   +'<p class="muted">You earned it! 5 free throws — tap SHOOT when the marker is in the green zone.</p>'
   +'<div style="font-size:56px;margin:10px 0" id="hoopAnim">🏀&nbsp;&nbsp;&nbsp;&nbsp;🧺</div>'
   +'<h3 id="hoopScore">Shot 1 of 5 · Made 0</h3>'
   +'<div style="position:relative;height:34px;background:var(--panel2);border:2px solid #b9d4f3;border-radius:17px;margin:18px 0;overflow:hidden">'
   +'<div style="position:absolute;left:38%;width:24%;top:0;bottom:0;background:rgba(59,178,115,.45)"></div>'

   +'<button class="btn secondary" style="font-size:15px;padding:8px 16px" onclick="endHoops()">Done playing</button>'
   +'</div>';
  say("Bonus hoops! Tap shoot when the marker is in the green zone. Five free throws!");
  hoopRun();
}
function hoopRun(){
  if(hoopInt)clearInterval(hoopInt);
  H.pos=0;H.dir=1;H.live=true;
  hoopInt=setInterval(()=>{
    H.pos+=H.dir*3.4;
    if(H.pos>=100){H.pos=100;H.dir=-1}
    if(H.pos<=0){H.pos=0;H.dir=1}
    const m=$("hoopMark");if(m)m.style.left="calc("+H.pos+"% - 7px)";
  },16);
}
function hoopsShoot(){
  if(!H||!H.live)return;
  H.live=false;
  if(hoopInt){clearInterval(hoopInt);hoopInt=null}
  const hit=H.pos>=38&&H.pos<=62;
  H.shot++;
  if(hit){H.made++;P.xp+=3;save()}
  const an=$("hoopAnim");if(an)an.innerHTML=hit?'🏀➡️🧺 <b style="color:#3bb273">SWISH!</b>':'🏀↩️ <b style="color:#ff6b4a">Rim out!</b>';
  const sc=$("hoopScore");if(sc)sc.textContent="Shot "+Math.min(H.shot+1,5)+" of 5 · Made "+H.made;
  say(hit?"Swish!":"So close!");
  if(H.shot>=5)setTimeout(endHoops,1200);
  else setTimeout(()=>{if(!H)return;const a2=$("hoopAnim");if(a2)a2.innerHTML="🏀&nbsp;&nbsp;&nbsp;&nbsp;🧺";hoopRun()},900);
}
function endHoops(){
  if(hoopInt){clearInterval(hoopInt);hoopInt=null}
  if(!H)return;
  const made=H.made,shots=H.shot;
  H=null;
  if(made===5){
    awardTrophy({type:"hoops",icon:"🏀",label:"Sharpshooter",color:"#f5a623",detail:"Made 5 of 5 bonus free throws!"});
    confetti();
  }
  app.innerHTML='<div class="fadein center">'
   +'<div class="ananse-wrap '+(made===5?"ananse-celebrate":"")+'">'+ananseSVG(140,made>=3?"party":"idle")+'</div>'
   +'<h1>'+(made===5?"🏆 Sharpshooter!":"Nice shooting!")+'</h1>'
   +'<div class="speech" style="max-width:420px;margin:14px auto">You made '+made+' of '+shots+' free throws'+(made?' and earned +'+(made*3)+' XP':'')+'. '+(made===5?'A Sharpshooter trophy is waiting in your trophy room!':'Keep practicing — your aim grows just like your brain!')+'</div>'
   +'<div class="spacer"></div><div class="btn-row"><button class="btn big" onclick="goHome()">Daily Path 🏠</button>'
   +(made===5?'<button class="btn secondary big" onclick="renderTrophyRoom()">Trophy Room 🏆</button>':"")
   +'</div></div>';
  say("You made "+made+" of "+shots+"! Great bonus game.");
}
</script>

function seqChainLen(){const r=(P&&P.stats&&P.stats.recall)||38;return r>=70?4:(r>=55?3:2);}
let R=null;
function startStoryReplay(){
  clearTimers();closeOverlay();defocus();showAnanseCorner(false);
  const sq=pick(SEQUENCES);
  const n=seqChainLen();
  R={sq,events:sq.events.slice(0,n),qi:0,correct:0,total:0};
  ambientStart();
  app.innerHTML='<div class="fadein" style="max-width:640px;margin:0 auto">'
   +'<div class="center"><div class="ananse-wrap">'+ananseSVG(110,"teach")+'</div>'
   +'<div class="speech" style="max-width:480px;margin:10px auto">Listen and read carefully. After the story, I will ask you what happened FIRST and what came NEXT!</div></div>'
   +'<div class="spacer"></div>'

}
function replayStart(){ambientStop();R.qi=0;R.correct=0;R.total=0;replayQuestion();}
function replayQuestion(){
  defocus();if(typeof document!=="undefined"&&document.body)document.body.classList.add("focus");
  const ev=R.events,i=R.qi;
  if(i>=ev.length)return replayDone();
  // q0: what happened FIRST; later: what happened NEXT after previous event
  const correctText=ev[i];
  const distractors=ev.filter((_,k)=>k!==i);
  const opts=shuffle([correctText].concat(distractors.slice(0,3))).slice(0,Math.min(4,ev.length));
  if(!opts.includes(correctText))opts[0]=correctText;
  R.order=opts;R.ans=opts.indexOf(correctText);
  const letters=["A","B","C","D"];
  const prompt=i===0?"What happened FIRST in the story?":"What happened NEXT, after “"+ev[i-1]+"”?";
  app.innerHTML='<div class="fadein focus-wrap">'
   +'<div class="hud"><span class="pill">🎬 <b>Story Replay</b></span>'
   +'<span class="lvl-badge">Step '+(i+1)+' of '+ev.length+'</span></div>'
   +'<div class="card gold"><p class="qtext">'+esc(prompt)+'</p>'
   +'<div class="center" style="margin:-4px 0 10px"><button class="readbtn" onclick="say(R.sq.text)">🔊 Hear the story again</button></div>'
   +'<div class="opts">'+opts.map((o,pos)=>'<button class="opt" id="ropt'+pos+'" onclick="replayAnswer('+pos+')"><span class="letter">'+letters[pos]+'</span><span>'+esc(o)+'</span></button>').join("")+'</div>'
   +'</div></div>';
  say(prompt);
}
function replayAnswer(pos){
  const correct=pos===R.ans;
  R.order.forEach((o,p)=>{const b=$("ropt"+p);if(!b)return;if(p===R.ans)b.classList.add("correct");else if(p===pos&&!correct)b.classList.add("wrong");else b.classList.add("dim");b.onclick=null;});
  R.total++;
  // count toward recall metric + stat growth
  if(correct){
    R.correct++;P.streak++;if(P.streak>P.bestStreak)P.bestStreak=P.streak;
    if(!P.stats)P.stats={speed:90,reading:80,memory:72,strategy:42,recall:38};
    P.stats.recall=Math.min(99,P.stats.recall+2);P.stats.memory=Math.min(99,P.stats.memory+1);
    R.consec=(R.consec||0)+1;
    sfx("correct");save();
    if(R.consec>=3&&typeof fireCelebration==="function")fireCelebration("recall3");
  }else{R.consec=0;P.streak=0;sfx("wrong");save();}
  const msg=correct?"Yes! That is exactly the right order.":"Good try! The right one was “"+R.events[R.qi]+"”.";
  setTimeout(()=>{
    openOverlay('<div class="center"><div class="ananse-wrap">'+ananseSVG(110,correct?"party":"teach")+'</div><div class="speech">'+esc(msg)+'</div><div class="spacer"></div><button class="btn big" onclick="closeOverlay();replayNext()">Next ▶</button></div>');
    say(msg);
  },700);
}
function replayNext(){R.qi++;replayQuestion();}
function replayDone(){
  defocus();ambientStop();

  P.sessions.push({date:today(),subject:"comprehension",correct:R.correct,total:R.total,lvlAvg:1,xp:R.correct*8,t:Date.now(),

}

/* ============================================================
   SPOT THE PATTERN mini-game (#14) — 3 items max per round
   Jersey-number skip counts + Kente colour repeats.
   ============================================================ */
const KENTE_COLORS={gold:"#C9A84C",green:"#1B4332",red:"#c0492f",black:"#1a1a1a",blue:"#2a5fa8"};
let G=null;
function makePattern(){
  if(Math.random()<0.5){
    // numeric skip-count jersey numbers
    const step=pick([2,3,5,10]);const start=pick([0,1,2,3,4])+step;
    const seq=[start,start+step,start+step*2,start+step*3];
    const ans=start+step*4;
    const opts=shuffle([ans,ans+step,ans-step,ans+1]).slice(0,4);
    if(!opts.includes(ans))opts[0]=ans;
    return{kind:"num",seq:seq,ans:String(ans),opts:opts.map(String),
      prompt:"What jersey number comes NEXT?",hint:"The numbers go up by "+step+" each time."};
  }else{
    // kente colour repeat
    const cols=Object.keys(KENTE_COLORS);
    const a=pick(cols);let b=pick(cols);while(b===a)b=pick(cols);
    const unit=[a,b];const seq=[a,b,a,b,a]; // next should be b
    const ans="b"; const optCols=shuffle([a,b,pick(cols.filter(c=>c!==a&&c!==b))]);
    return{kind:"col",seq:seq,ansCol:b,opts:optCols,
      prompt:"Which colour comes NEXT in the Kente pattern?",hint:"The pattern repeats: "+a+", "+b+", "+a+", "+b+"…"};
  }
}
function startPatterns(){
  clearTimers();closeOverlay();defocus();showAnanseCorner(false);
  G={i:0,n:3,correct:0};
  say("Spot the Pattern! Look closely and find what comes next.");
  patternRound();
}
function swatchHTML(col){return '<span class="swatch" style="background:'+(KENTE_COLORS[col]||"#ccc")+'"></span>';}
function patternRound(){
  if(typeof document!=="undefined"&&document.body)document.body.classList.add("focus");
  if(G.i>=G.n)return patternDone();
  const p=makePattern();G.cur=p;
  const letters=["A","B","C","D"];
  let cells,optsHTML,ansIdx;
  if(p.kind==="num"){
    cells=p.seq.map(n=>'<span class="pat-cell">'+n+'</span>').join("")+'<span class="pat-cell q">?</span>';
    const order=shuffle(p.opts.map((_,i)=>i));G.order=order;ansIdx=p.opts.indexOf(p.ans);
    optsHTML=order.map((oi,pos)=>'<button class="opt" id="gopt'+pos+'" onclick="patternAnswer('+pos+')"><span class="letter">'+letters[pos]+'</span><span>'+esc(p.opts[oi])+'</span></button>').join("");
    G.ans=order.indexOf(ansIdx);
  }else{
    cells=p.seq.map(c=>'<span class="pat-cell">'+swatchHTML(c)+'</span>').join("")+'<span class="pat-cell q">?</span>';
    const order=shuffle(p.opts.map((_,i)=>i));G.order=order;ansIdx=p.opts.indexOf(p.ansCol);
    optsHTML=order.map((oi,pos)=>'<button class="opt" id="gopt'+pos+'" onclick="patternAnswer('+pos+')"><span class="letter">'+letters[pos]+'</span>'+swatchHTML(p.opts[oi])+'<span>'+esc(p.opts[oi])+'</span></button>').join("");
    G.ans=order.indexOf(ansIdx);
  }
  app.innerHTML='<div class="fadein focus-wrap">'
   +'<div class="hud"><span class="pill">🧩 <b>Spot the Pattern</b></span><span class="lvl-badge">'+(G.i+1)+' of '+G.n+'</span></div>'
   +'<div class="card gold"><p class="qtext">'+esc(p.prompt)+'</p>'
   +'<div class="pat-row">'+cells+'</div>'
   +'<div class="opts">'+optsHTML+'</div></div></div>';
  say(p.prompt);
}
function patternAnswer(pos){
  const correct=pos===G.ans;
  G.order.forEach((o,p)=>{const b=$("gopt"+p);if(!b)return;if(p===G.ans)b.classList.add("correct");else if(p===pos&&!correct)b.classList.add("wrong");else b.classList.add("dim");b.onclick=null;});
  if(correct){G.correct++;P.stats.memory=Math.min(99,(P.stats.memory||72)+1);sfx("correct");}else sfx("wrong");
  save();
  const msg=correct?"Nice eyes! That is the pattern.":"Almost! "+G.cur.hint;
  setTimeout(()=>{openOverlay('<div class="center"><div class="ananse-wrap">'+ananseSVG(100,correct?"party":"teach")+'</div><div class="speech">'+esc(msg)+'</div><div class="spacer"></div><button class="btn big" onclick="closeOverlay();patternNext()">Next ▶</button></div>');say(msg);},600);
}
function patternNext(){G.i++;patternRound();}
function patternDone(){
  defocus();confetti();
  app.innerHTML='<div class="fadein center">'
   +'<div class="ananse-wrap ananse-celebrate">'+ananseSVG(140,"party")+'</div>'
   +'<h1>Pattern Pro!</h1>'
   +'<div class="speech" style="max-width:440px;margin:14px auto">You spotted '+G.correct+' of '+G.n+' patterns. Pattern-spotting trains your brain to see how things connect!</div>'
   +'<div class="center"><div class="spacer"></div><div class="btn-row">'
   +'<button class="btn big" onclick="startPatterns()">Again 🧩</button>'
   +'<button class="btn secondary" onclick="goHome()">🏠 Home</button></div></div></div>';
  say("You found "+G.correct+" patterns. Great pattern power!");
}

{title:"Grandfather's Drum",text:"When Grandfather was a boy in Kumasi, he carved a drum from a fallen cedar tree. He played it at festivals for fifty years, until his hands grew tired. Last month, he placed the drum in my arms. 'It is not a gift,' he said. 'It is a promise.' At first I did not understand. But as I practiced each evening, neighbors began to gather outside our window, clapping and singing like they once did for him. Now I know what I promised: to keep the music alive.",qs:[

{title:"The Night Market Mystery",text:"Every Friday, the night market in Osu glowed with lanterns — until the week the lights began vanishing, one stall at a time. Some traders whispered about ghosts. Nana Yaa, who sold kelewele, was not convinced. She noticed the lights only disappeared on windy nights, and only from the stalls nearest the sea. So on Friday she arrived early, hid behind her stall, and waited. As the sea breeze rose, she watched a loose canvas sheet swing against the lantern hooks, knocking them one by one into a basket below. The 'ghost' was nothing but wind and bad knots. Nana Yaa retied every lantern with a fisherman's knot, and the market never went dark again.",qs:[

{q:"What lesson does this story teach?",opts:["Look for evidence instead of believing rumors","Ghosts are real","Never sell food at night","Wind is dangerous"],a:0,topic:"comprehension",teach:[{i:"💡",t:"Compare the traders (whispered rumors) with Nana Yaa (gathered evidence)."},{i:"⚖️",t:"Rumors solved nothing. Observation fixed the market for good."},{i:"🎯",t:"The lesson: trust evidence and careful thinking over rumors."}]}

{title:"The Final Buzzer",text:"With the national title on the line, the Accra Lions trailed by two points. Ten seconds remained. Captain Kojo had promised his late father he would bring the trophy home, and that promise weighed on him like a backpack full of stones. The inbound pass found his hands. Two defenders rushed toward him — everyone in the arena knew the plan was for Kojo to shoot. But from the corner of his eye, he saw Serwaa, completely open at the three-point line, waving. A promise, Kojo realized, is not about who takes the shot. He whipped the pass to Serwaa. The buzzer sounded as her shot arced through the night air... and snapped the net. Champions.",qs:[

function subjAccuracy(subj,sinceT,untilT){
  let c=0,t=0;
  P.sessions.forEach(s=>{
    if(subj&&s.subject!==subj)return;
    if(sinceT&&(s.t||0)<sinceT)return;
    if(untilT&&(s.t||0)>=untilT)return;
    c+=s.correct;t+=s.total;
  });
  return t?c/t:null;
}

function recentWrongTopics(days){
  const cut=addDays(today(),-days);
  const counts={};
  P.wrongLog.filter(w=>w.date>=cut).forEach(w=>counts[w.topic]=(counts[w.topic]||0)+1);
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([t])=>t);
}
function buildInsights(){
  const out=[];
  const wk=Date.now()-7*864e5;
  let any=false;
  Object.keys(SUBJECTS).forEach(s=>{
    const acc=subjAccuracy(s,wk);
    if(acc===null)return;
    any=true;
    if(acc>=0.8)out.push({cls:"good",t:P.name+" is strong in "+SUBJECTS[s].name+" this week — getting about "+Math.round(acc*100)+" of every 100 questions right. He is ready to be stretched here."});
    else if(acc>=0.55)out.push({cls:"",t:P.name+" is making steady progress in "+SUBJECTS[s].name+". He gets most questions right and Ananse is reteaching the ones he misses."});
    else out.push({cls:"warn",t:SUBJECTS[s].name+" is the struggle zone right now. He is finding more than half the questions hard — extra encouragement (not pressure) will help most."});
  });
  const weak=recentWrongTopics(7);
  if(weak.length)out.push({cls:"warn",t:"The single topic giving him the most trouble lately is \""+weak[0]+"\". Ananse has been reteaching it, and it is queued for extra review."});
  if(P.bestStreak>=10)out.push({cls:"good",t:"His best answer streak is "+P.bestStreak+" in a row — when he locks in, he really locks in."});
  if(!any)out.push({cls:"",t:"No sessions yet this week. The insights will fill in as "+P.name+" plays."});
  return out;
}

function sessSum(sessions,field){return sessions.reduce((a,s)=>a+(s[field]||0),0);}
function accPct(c,t){return t?Math.round(100*c/t):null;}
function interventionStats(){
  const ss=P.sessions||[];
  const now=Date.now(),wk=7*864e5;
  const thisW=ss.filter(s=>(s.t||0)>=now-wk);
  const lastW=ss.filter(s=>(s.t||0)>=now-2*wk&&(s.t||0)<now-wk);
  const wpThis=accPct(sessSum(thisW,"wpC"),sessSum(thisW,"wpT"));
  const wpLast=accPct(sessSum(lastW,"wpC"),sessSum(lastW,"wpT"));
  const recallThis=accPct(sessSum(thisW,"recallC"),sessSum(thisW,"recallT"));
  const recallLast=accPct(sessSum(lastW,"recallC"),sessSum(lastW,"recallT"));
  const reviewThis=accPct(sessSum(thisW,"reviewC"),sessSum(thisW,"reviewT"));
  const mfThis=accPct(sessSum(thisW,"mfC"),sessSum(thisW,"mfT"));
  const durs=thisW.filter(s=>s.durMs).map(s=>s.durMs);
  const avgMin=durs.length?Math.round(durs.reduce((a,b)=>a+b,0)/durs.length/60000*10)/10:null;
  return {wpThis,wpLast,recallThis,recallLast,reviewThis,mfThis,avgMin,games:thisW.length};
}
function trend(now,prev){
  if(now===null)return"";
  if(prev===null)return' <span class="muted" style="font-size:14px">(new)</span>';
  if(now>prev)return' <span style="color:#3bb273;font-size:14px">▲ up '+(now-prev)+'</span>';
  if(now<prev)return' <span style="color:#e0512f;font-size:14px">▼ down '+(prev-now)+'</span>';
  return' <span class="muted" style="font-size:14px">(steady)</span>';
}
function interventionTrackerHTML(){

  const st=P.stats||{};
  return '<div class="card">'
   +row("🏀 Word-problem accuracy",m.wpThis,"%",trend(m.wpThis,m.wpLast))
   +row("📖 Reading recall accuracy",m.recallThis,"%",trend(m.recallThis,m.recallLast))
   +row("🔁 Opening-review accuracy",m.reviewThis,"%","")
   +row("⚡ Math-facts fluency",m.mfThis,"%","")
   +row("⏱️ Avg time-on-task / session",m.avgMin," min","")

   +'</div>'

}

function handleRestoreFile(ev){
  const file=ev.target.files&&ev.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(){
    let parsed;
    try{parsed=JSON.parse(reader.result);}catch(e){toast("That file isn't a valid backup");return;}
    const incoming=parsed&&parsed.data?parsed.data:parsed;
    if(!incoming||!Array.isArray(incoming.profiles)){toast("That file isn't a Learning Zone backup");return;}
    const n=incoming.profiles.length;
    openOverlay('<div class="center"><h2>Restore this backup?</h2><p class="muted" style="margin-top:8px">It contains '+n+' profile'+(n===1?'':'s')+'. This will replace everything currently on this device. This cannot be undone.</p><div class="spacer"></div><div class="btn-row"><button class="btn secondary" onclick="closeOverlay()">Cancel</button><button class="btn" onclick="doRestore()">Yes, restore</button></div></div>');
    window._restorePending=incoming;
  };
  reader.readAsText(file);
}
function doRestore(){
  closeOverlay();
  const incoming=window._restorePending;
  if(!incoming){toast("Nothing to restore");return;}
  const base=defaultDB();
  DB=Object.assign(base,incoming);
  DB.telegram=Object.assign(base.telegram,incoming.telegram||{});
  P=null;save();
  window._restorePending=null;
  toast("Backup restored");
  renderProfiles();
}

/* shared low-level Telegram send (used by daily report AND threshold alerts #16) */
function tgSend(text,onOk){
  const tg=DB.telegram;
  if(!tg.token||!tg.chat)return false;
  if(typeof navigator!=="undefined"&&navigator&&navigator.onLine===false)return false;
  fetch("https://api.telegram.org/bot"+encodeURIComponent(tg.token)+"/sendMessage",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({chat_id:tg.chat,text:text})
  }).then(r=>r.json()).then(j=>{if(j.ok&&onOk)onOk();}).catch(()=>{});
  return true;
}
function sendTelegram(manual){
  const tg=DB.telegram;
  if(!tg.token||!tg.chat){if(manual)toast("Enter bot token and chat ID first");return}
  if(typeof navigator!=="undefined"&&navigator&&navigator.onLine===false){if(manual)toast("Offline — will send when online");return}
  const ok=tgSend(buildReport(),()=>{tg.lastSent=today()+(manual?" (manual)":"");save();toast("Report sent ✓");const el=$("tgStatus");if(el)el.textContent="Last sent: "+tg.lastSent});
  if(!ok&&manual)toast("Telegram error — check token/chat ID");
}

  const [h,m]=(tg.time||"19:00").split(":").map(Number);

  if(now.getHours()>h||(now.getHours()===h&&now.getMinutes()>=m))sendTelegram(false);

function checkAlerts(){
  if(!P)return;
  const tg=DB.telegram;if(!tg||!tg.token||!tg.chat)return;
  const m=interventionStats();
  // 1) word-problem accuracy below 60%
  if(m.wpThis!==null&&m.wpThis<60){
    alertOnce("wp_low","⚠️ Word-problem accuracy is "+m.wpThis+"% this week (target 60%+). Try a few coin/counter problems together at home.");
  }
  // 2) opening-review accuracy declining 2+ consecutive days
  if(reviewDecline2Days())alertOnce("review_decline","📉 Opening-review accuracy has dropped two days running. The earlier material needs another pass — Ananse is re-queuing it.");
  // 3) most recent session under 5 minutes
  const last=(P.sessions||[]).slice(-1)[0];
  if(last&&last.durMs&&last.durMs<5*60000&&!last.replay){
    alertOnce("short_session","⏱️ The last session ran under 5 minutes ("+Math.max(1,Math.round(last.durMs/60000))+" min). A short check-in can help him settle into a longer focus block.");
  }
}
function reviewDecline2Days(){
  // group review accuracy by date, check last 3 days strictly decreasing
  const byDay={};
  (P.sessions||[]).forEach(s=>{if(s.reviewT){const d=s.date;byDay[d]=byDay[d]||{c:0,t:0};byDay[d].c+=s.reviewC;byDay[d].t+=s.reviewT;}});
  const days=Object.keys(byDay).sort().slice(-3);
  if(days.length<3)return false;
  const a=byDay[days[0]],b=byDay[days[1]],c=byDay[days[2]];
  const pa=a.c/a.t,pb=b.c/b.t,pc=c.c/c.t;
  return pc<pb&&pb<pa;
}
function fireCelebration(kind,extra){
  const tg=DB.telegram;if(!tg||!tg.token||!tg.chat)return;
  if(kind==="recall3"){alertOnce("celebrate_recall3","🎉 Great news! "+P.name+" just nailed 3 story-recall answers in a row. Reading memory is clicking — tell him you noticed!");}
  else if(kind==="milestone"){alertOnce("celebrate_milestone_"+(extra||""),"🏅 Milestone! "+P.name+"'s "+(extra||"")+" stat just hit a new high on his player card. The intervention is paying off.");}
}

/* migrate old saves: reading → english + comprehension, add colors */
(function(){
  let changed=false;
  DB.profiles.forEach(p=>{
    if(p.levels&&p.levels.reading!==undefined){
      p.levels.english=p.levels.english||p.levels.reading||1;
      p.levels.comprehension=p.levels.comprehension||p.levels.reading||1;
      delete p.levels.reading;changed=true;
    }
    Object.keys(SUBJECTS).forEach(s=>{if(p.levels&&!p.levels[s]){p.levels[s]=1;changed=true}});
    if(!p.color){p.color=pick(PCOLORS);changed=true}
    if(!p.stats){p.stats={speed:90,reading:80,memory:72,strategy:42,recall:38};changed=true}
    if(!p.alertLog){p.alertLog={};changed=true}
    (p.sessions||[]).forEach(se=>{if(se.subject==="reading"){se.subject="comprehension";changed=true}});
    (p.trophies||[]).forEach(t=>{if(t.subject==="reading"){t.subject="comprehension";changed=true}});
  });
  if(changed)save();
})();
