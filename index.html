<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-title" content="Learning Zone">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Learning Zone</title>
<style>
:root{
  --bg:#ffffff; --bg2:#f2f7ff; --panel:#ffffff; --panel2:#e9f2ff;
  --gold:#f5a623; --gold-bright:#ffc94d; --gold-dim:#e09b1a;
  --red:#ff6b4a; --green:#3bb273; --blue:#4aa3e0; --cream:#1f3c70;
  --ink:#1f3c70; --ink-dim:#6f88ad;
  --kente:repeating-linear-gradient(90deg,#f5a623 0 14px,#ff6b4a 14px 28px,#4aa3e0 28px 36px,#3bb273 36px 50px,#f5a623 50px 56px,#7c5cf0 56px 68px);
  --shadow:0 8px 28px rgba(80,130,210,.16);
  --radius:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,"SF Pro Rounded",BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  font-size:20px; line-height:1.45; overflow-x:hidden;
  background-image:radial-gradient(ellipse at 50% -10%, #e3efff 0%, var(--bg) 60%);
  min-height:100vh;
}
#topbar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;pointer-events:none}
#topbar .tb-btn{pointer-events:auto;background:var(--panel);border:2px solid #b9d4f3;color:var(--blue);border-radius:14px;min-width:52px;height:48px;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);padding:0 12px}
#topbar .tb-btn:active{transform:scale(.94)}
.kente-strip{height:8px;background:var(--kente);border-radius:4px;opacity:.9}
#app{max-width:980px;margin:0 auto;padding:74px 18px 40px;min-height:100vh}
h1,h2,h3{font-weight:800;letter-spacing:.2px}
h1{font-size:32px;color:#2d6fc0}
h2{font-size:26px;color:#2d6fc0}
h3{font-size:22px;color:var(--ink)}
.muted{color:var(--ink-dim);font-size:17px}
.card{background:var(--panel);border:2px solid #cfe0f7;border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
.card.gold{border-color:var(--gold)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#14365f;font-weight:800;font-size:22px;border:none;border-radius:16px;padding:16px 26px;cursor:pointer;box-shadow:0 4px 0 var(--gold-dim),var(--shadow);font-family:inherit}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--gold-dim)}
.btn.secondary{background:var(--panel2);color:#2d6fc0;box-shadow:0 4px 0 #b9d4f3,var(--shadow);border:2px solid #b9d4f3}
.btn.big{font-size:26px;padding:20px 34px;border-radius:20px}
.btn.danger{background:linear-gradient(180deg,#ff8a6e,var(--red));color:#fff;box-shadow:0 4px 0 #c14a2e}
.btn:disabled{opacity:.45;pointer-events:none}
.btn-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.center{text-align:center}
.spacer{height:18px}

/* ---------- Answer options ---------- */
.qtext{font-size:26px;font-weight:700;line-height:1.5;color:var(--ink)}
@media(min-width:700px){.qtext{font-size:30px}}
.opts{display:grid;grid-template-columns:1fr;gap:14px;margin-top:22px}
@media(min-width:640px){.opts{grid-template-columns:1fr 1fr}}
.opt{background:var(--panel2);border:3px solid #b9d4f3;border-radius:18px;padding:18px 20px;font-size:24px;font-weight:700;color:var(--ink);cursor:pointer;text-align:left;display:flex;align-items:center;gap:14px;font-family:inherit;transition:border-color .15s}
.opt .letter{background:var(--blue);color:#fff;border-radius:10px;min-width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.opt:active{border-color:var(--blue)}
.opt.correct{border-color:var(--green);background:#e7f7ee}
.opt.wrong{border-color:var(--red);background:#ffeae4}
.opt.dim{opacity:.4;pointer-events:none}

/* ---------- HUD ---------- */
.hud{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.hud .pill{background:var(--panel);border:2px solid #cfe0f7;border-radius:999px;padding:8px 16px;font-size:16px;font-weight:700;color:var(--ink-dim);display:flex;gap:8px;align-items:center}
.hud .pill b{color:#2d6fc0}
.dots{display:flex;gap:6px}
.dot{width:14px;height:14px;border-radius:50%;background:#d8e6fa}
.dot.on{background:var(--gold)}
.dot.bad{background:var(--red)}
.lvl-badge{background:linear-gradient(135deg,#4aa3e0,#2d6fc0);color:#fff;border-radius:999px;padding:8px 16px;font-weight:900;font-size:16px}

/* ---------- Overlay ---------- */
#overlay{position:fixed;inset:0;background:rgba(210,228,250,.78);z-index:100;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 16px;backdrop-filter:blur(5px)}
#overlay.show{display:flex}
.ov-card{background:var(--panel);border:3px solid var(--blue);border-radius:26px;max-width:680px;width:100%;padding:26px;box-shadow:var(--shadow);margin:auto;animation:pop .3s ease}
@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.teach-illus{font-size:88px;text-align:center;margin:14px 0;animation:bounceIn .45s ease}
@keyframes bounceIn{0%{transform:scale(.3)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.teach-text{font-size:24px;font-weight:700;text-align:center;color:var(--ink);min-height:80px}
.step-dots{display:flex;gap:8px;justify-content:center;margin:16px 0}
.step-dots .dot{width:12px;height:12px}

/* ---------- Stop sign ---------- */
.stopsign{width:150px;height:150px;background:var(--red);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:30px;clip-path:polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%);animation:shake .5s ease;border:6px solid #fff;letter-spacing:1px;box-shadow:var(--shadow)}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}

/* ---------- Ananse ---------- */
.ananse-wrap{display:flex;justify-content:center}
.ananse-idle{position:fixed;bottom:14px;right:14px;z-index:40;width:92px;height:92px;pointer-events:none;animation:floaty 3.5s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.ananse-celebrate svg{animation:dance .6s ease-in-out infinite alternate}
@keyframes dance{from{transform:rotate(-7deg) translateY(0)}to{transform:rotate(7deg) translateY(-12px)}}
.speech{background:#f7fbff;color:#1f3c70;border:3px solid var(--blue);border-radius:18px;padding:16px 20px;font-size:20px;font-weight:700;position:relative;margin-top:14px}
.speech:before{content:"";position:absolute;top:-15px;left:50%;transform:translateX(-50%);border:12px solid transparent;border-bottom-color:var(--blue);border-top:0}

/* ---------- Subject tiles ---------- */
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.subj-tile{border:3px solid #b9d4f3;border-radius:22px;padding:22px 16px;text-align:center;cursor:pointer;background:var(--panel2);font-family:inherit;color:var(--ink);box-shadow:var(--shadow)}
.subj-tile .ic{font-size:52px;display:block;margin-bottom:8px}
.subj-tile .nm{font-size:20px;font-weight:800}
.subj-tile:active{transform:scale(.96)}
.subj-tile.glow{border-color:var(--gold);box-shadow:0 0 24px rgba(245,166,35,.4)}

/* ---------- Trophy room ---------- */
.shelf{background:linear-gradient(180deg,#ddebff,#c5dcfb);border-radius:14px;border-bottom:10px solid #9cc0ed;padding:18px 12px 8px;margin-bottom:22px}
.shelf-label{font-size:15px;font-weight:800;color:#5d7fb0;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;padding-left:6px}
.shelf-row{display:flex;gap:10px;flex-wrap:wrap}
.trophy{width:84px;height:96px;background:var(--panel);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:2px solid #b9d4f3;padding:6px}
.trophy .t-ic{font-size:40px}
.trophy .t-lb{font-size:10px;color:var(--ink-dim);text-align:center;line-height:1.2;margin-top:4px;font-weight:700}
.trophy.silhouette{opacity:.4;filter:grayscale(1)}
.trophy:active{transform:scale(.93)}

/* ---------- 2K card ---------- */
.card2k{background:linear-gradient(160deg,#101720 0%,#1b2737 55%,#0d1117 100%);border:3px solid #3c5a82;border-radius:26px;padding:26px;color:#e8f0fa;box-shadow:var(--shadow)}
.card2k .ovr{font-size:84px;font-weight:900;color:#ffd97a;line-height:1;text-shadow:0 4px 18px rgba(255,217,122,.4)}
.card2k .ovr-lb{font-size:14px;letter-spacing:3px;color:#9db4d4;font-weight:800}
.statline{display:flex;justify-content:space-between;align-items:center;padding:12px 4px;border-bottom:1px solid #d8e6fa;font-size:19px}
.statline b{font-size:24px;color:#2d6fc0}
.card2k .statline{border-bottom:1px solid #28405e}
.card2k .statline b{color:#ffd97a}
.statbar{height:10px;border-radius:5px;background:#26344a;flex:1;margin:0 16px;overflow:hidden}
.statbar i{display:block;height:100%;background:linear-gradient(90deg,#5a93c4,#ffd97a);border-radius:5px}

/* ---------- Parent dashboard ---------- */
.insight{border-left:6px solid var(--gold);padding:14px 16px;background:var(--panel2);border-radius:0 14px 14px 0;margin-bottom:12px;font-size:18px}
.insight.warn{border-left-color:var(--red)}
.insight.good{border-left-color:var(--green)}
input,select{font-family:inherit;font-size:20px;background:var(--bg2);color:var(--ink);border:2px solid #b9d4f3;border-radius:12px;padding:12px 14px;width:100%}
input:focus,select:focus{outline:none;border-color:var(--blue)}
label{font-size:16px;font-weight:700;color:var(--ink-dim);display:block;margin:14px 0 6px}
.pin-display{display:flex;gap:12px;justify-content:center;margin:18px 0}
.pin-digit{width:54px;height:64px;border:3px solid #b9d4f3;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;background:var(--bg2);color:var(--ink)}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px;justify-content:center}
.pin-pad button{height:64px;border-radius:16px;font-size:26px;font-weight:800;background:var(--panel);color:var(--ink);border:2px solid #b9d4f3;cursor:pointer;font-family:inherit;box-shadow:var(--shadow)}
.pin-pad button:active{background:var(--blue);color:#fff}

/* ---------- Misc ---------- */
.bar{height:16px;background:var(--panel2);border-radius:8px;overflow:hidden;border:1px solid #cfe0f7}
.bar i{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,var(--gold-dim),var(--gold-bright))}
.confetti{position:fixed;top:-20px;font-size:26px;z-index:200;animation:fall linear forwards;pointer-events:none}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;font-weight:900;font-size:20px;padding:14px 26px;border-radius:999px;z-index:300;box-shadow:var(--shadow);animation:pop .3s ease}
.profile-tile{display:flex;align-items:center;gap:16px;width:100%;text-align:left;margin-bottom:12px}
.break-timer{font-size:64px;font-weight:900;color:#2d6fc0;text-align:center;font-variant-numeric:tabular-nums}
.adinkra-divider{display:flex;align-items:center;gap:14px;margin:22px 0;color:var(--blue)}
.adinkra-divider:before,.adinkra-divider:after{content:"";flex:1;height:2px;background:#cfe0f7}
.fadein{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.report-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.report-row .rn{min-width:150px;font-weight:800;font-size:18px}
</style>
</head>
<body>
<div id="topbar">
  <button class="tb-btn" id="homeBtn" onclick="goHome()" title="Home">🏠</button>
  <button class="tb-btn" id="usersBtn" onclick="exitToProfiles()" title="Switch learner">👥</button>
  <button class="tb-btn" id="soundBtn" onclick="toggleSound()" title="Sound">🔊</button>
</div>
<div id="app"></div>
<div id="overlay"></div>
<div id="anansecorner"></div>
<script>
"use strict";
/* ============================================================
   PRINCE'S LEARNING ZONE — offline adaptive learning app
   Ananse the Wise Spider · Ghanaian theme · ADHD-friendly
   ============================================================ */

/* ---------- helpers ---------- */
const $=id=>document.getElementById(id);
const app=$("app"), overlay=$("overlay");
const rnd=n=>Math.floor(Math.random()*n);
const pick=a=>a[rnd(a.length)];
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]]}return a};
const today=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
const addDays=(iso,n)=>{const d=new Date(iso+"T12:00:00");d.setDate(d.getDate()+n);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
const dayOfYear=()=>{const d=new Date();return Math.floor((d-new Date(d.getFullYear(),0,0))/864e5)};
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmtTime=ms=>{const s=Math.max(0,Math.ceil(ms/1000));return Math.floor(s/60)+":"+String(s%60).padStart(2,"0")};

/* ---------- persistent storage ---------- */
const DBKEY="plz_v1";
function defaultDB(){return{profiles:[],pin:null,sound:true,telegram:{token:"",chat:"",time:"19:00",lastSent:""}}}
let DB; try{DB=JSON.parse(localStorage.getItem(DBKEY))||defaultDB()}catch(e){DB=defaultDB()}
function save(){try{localStorage.setItem(DBKEY,JSON.stringify(DB))}catch(e){}}
let P=null; // active profile
let S=null; // active session

function newProfile(name,avatar){return{
  id:Date.now()+""+rnd(999),name,avatar,color:null,pin:null,created:today(),
  levels:{math:1,english:1,comprehension:1,science:1,history:1},
  diagDone:false,diag:null,
  trophies:[],streak:0,bestStreak:0,xp:0,
  sessions:[],sm2:{},wrongLog:[],
  daily:{date:"",done:false,ok:false},
  weeklyGoal:{topic:"",set:""},
  askedAt:{}
}}

/* ---------- text-to-speech (Ananse's voice) ---------- */
let ananseVoice=null;
function pickVoice(){
  if(!("speechSynthesis" in window))return;
  const vs=speechSynthesis.getVoices();
  ananseVoice=vs.find(v=>/en[-_](GH|NG|ZA)/i.test(v.lang))||vs.find(v=>/Daniel|Fred|Aaron|Male/i.test(v.name)&&v.lang.startsWith("en"))||vs.find(v=>v.lang.startsWith("en"))||null;
}
if("speechSynthesis" in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice}
function say(text){
  if(!DB.sound||!("speechSynthesis" in window))return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text.replace(/[*_#]/g,""));
    if(ananseVoice)u.voice=ananseVoice;
    u.rate=0.95;u.pitch=1.02;
    speechSynthesis.speak(u);
  }catch(e){}
}
function toggleSound(){
  DB.sound=!DB.sound;save();renderSoundBtn();
  if(!DB.sound&&"speechSynthesis" in window)speechSynthesis.cancel();
  else say("Sound is on. Akwaaba!");
}
function renderSoundBtn(){$("soundBtn").textContent=DB.sound?"🔊":"🔇"}

/* ---------- Ananse the Wise Spider (SVG) ---------- */
function ananseSVG(size,mood){ // mood: idle | teach | party
  const eyes=mood==="party"
    ?'<path d="M86 88 q8 -10 16 0" stroke="#2a1c06" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M118 88 q8 -10 16 0" stroke="#2a1c06" stroke-width="5" fill="none" stroke-linecap="round"/>'
    :'<circle cx="94" cy="88" r="9" fill="#fff"/><circle cx="96" cy="90" r="4.5" fill="#241803"/><circle cx="126" cy="88" r="9" fill="#fff"/><circle cx="128" cy="90" r="4.5" fill="#241803"/><circle cx="93" cy="86" r="2" fill="#fff" opacity=".9"/><circle cx="125" cy="86" r="2" fill="#fff" opacity=".9"/>';
  const mouth=mood==="teach"
    ?'<ellipse cx="110" cy="108" rx="9" ry="7" fill="#5a3a1a"/>'
    :'<path d="M96 106 q14 14 28 0" stroke="#5a3a1a" stroke-width="5" fill="none" stroke-linecap="round"/>';
  const legs=[];
  for(let s=-1;s<=1;s+=2)for(let i=0;i<4;i++){
    const y=120+i*14, x1=110+s*38, x2=110+s*(70+i*6), y2=y+22+(mood==="party"?(i%2?-10:6):8);
    legs.push('<path d="M'+x1+' '+y+' Q'+(110+s*60)+' '+(y-14)+' '+x2+' '+y2+'" stroke="#4a3318" stroke-width="7" fill="none" stroke-linecap="round"/><circle cx="'+x2+'" cy="'+y2+'" r="4" fill="#4a3318"/>');
  }
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg">'
   +legs.join("")
   // body with adinkra symbol (Gye Nyame-inspired spiral)
   +'<ellipse cx="110" cy="142" rx="42" ry="36" fill="#6b4a22"/>'
   +'<ellipse cx="110" cy="142" rx="42" ry="36" fill="none" stroke="#54381a" stroke-width="3"/>'
   +'<path d="M110 124 q14 4 14 18 q0 14 -14 18 q-14 -4 -14 -18 q0 -14 14 -18z" fill="none" stroke="#e8b549" stroke-width="3.5"/>'
   +'<circle cx="110" cy="142" r="5" fill="#e8b549"/>'
   // head
   +'<circle cx="110" cy="92" r="34" fill="#7d5728"/>'
   +'<circle cx="110" cy="92" r="34" fill="none" stroke="#5e4019" stroke-width="3"/>'
   +eyes+mouth
   // beaded necklace
   +'<path d="M84 116 q26 18 52 0" stroke="none" fill="none"/>'
   +'<circle cx="88" cy="118" r="5" fill="#c0492f"/><circle cx="99" cy="124" r="5" fill="#e8b549"/><circle cx="110" cy="126" r="5" fill="#4e8f5c"/><circle cx="121" cy="124" r="5" fill="#e8b549"/><circle cx="132" cy="118" r="5" fill="#2a5fa8"/>'
   // kente hat
   +'<path d="M78 74 L110 30 L142 74 Z" fill="#c0492f"/>'
   +'<path d="M85 65 L135 65 L142 74 L78 74 Z" fill="#e8b549"/>'
   +'<path d="M91 56 L129 56 L135 65 L85 65 Z" fill="#1a1a1a"/>'
   +'<path d="M97 48 L123 48 L129 56 L91 56 Z" fill="#4e8f5c"/>'
   +'<circle cx="110" cy="30" r="6" fill="#e8b549"/>'
   +'</svg>';
}
function showAnanseCorner(on){
  $("anansecorner").innerHTML=on?'<div class="ananse-idle">'+ananseSVG(92,"idle")+'</div>':"";
}
function toast(msg){
  const t=document.createElement("div");t.className="toast";t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2200);
}
function confetti(){
  const em=["🎉","⭐","🏆","✨","🎊","💛"];
  for(let i=0;i<26;i++){
    const c=document.createElement("div");c.className="confetti";c.textContent=pick(em);
    c.style.left=rnd(100)+"vw";c.style.animationDuration=(2+Math.random()*2)+"s";c.style.animationDelay=(Math.random()*0.8)+"s";
    document.body.appendChild(c);setTimeout(()=>c.remove(),5000);
  }
}

/* ---------- constants ---------- */
const SUBJECTS={
  math:{name:"Math",icon:"🔢",color:"#f5a623",blurb:"Hoops & numbers"},
  english:{name:"English",icon:"✏️",color:"#e0569a",blurb:"Words & grammar"},
  comprehension:{name:"Comprehension",icon:"📖",color:"#ff6b4a",blurb:"Stories & meaning"},
  science:{name:"Science",icon:"🚀",color:"#4aa3e0",blurb:"Explore with Ananse"},
  history:{name:"Ghana History",icon:"🪘",color:"#3bb273",blurb:"Kingdoms & culture"}
};
const PCOLORS=["#4aa3e0","#7c5cf0","#3bb273","#ff6b4a","#f5a623","#e0569a"];
function avatarHTML(p,size){
  return '<span style="display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+(p.color||"#4aa3e0")+';color:#fff;font-weight:900;font-size:'+Math.round(size*0.48)+'px;box-shadow:var(--shadow)">'+esc((p.name||"?").charAt(0).toUpperCase())+'</span>';
}
const PRAISE=[
 "You stayed focused on that hard one — that is what champions do.",
 "You tried a new strategy — that is exactly how your brain grows.",
 "That one was tough and you did not give up — that matters more than the answer.",
 "You read every word carefully before answering — that is a pro move.",
 "You took your time and thought it through — that is real training.",
 "You kept working even when it got tricky — your brain just got stronger.",
 "I saw you concentrate on every step — that is how the greats practice.",
 "You gave that question your full effort — that is what counts.",
 "You slowed down and checked your thinking — smart players do that.",
 "Every try teaches your brain something new — and you keep trying.",
 "You stuck with it from start to finish — that is true grit.",
 "You used what you learned before — that is clever thinking."
];
const BRAIN_BREAKS=[

function numOpts(ans,spread){ // build 4 unique numeric options
  const set=new Set([ans]);
  let guard=0;
  while(set.size<4&&guard++<60){
    let d=ans+(rnd(2)?1:-1)*(1+rnd(spread));
    if(d>=0&&!set.has(d))set.add(d);
  }
  while(set.size<4)set.add(ans+set.size*3+1);
  const opts=shuffle([...set]);
  return {opts:opts.map(String),a:opts.indexOf(ans)};
}
function moneyOpts(ans){ // cents
  const set=new Set([ans]);let g=0;
  while(set.size<4&&g++<60){let d=ans+(rnd(2)?1:-1)*pick([5,10,25]);if(d>0&&!set.has(d))set.add(d)}
  const arr=shuffle([...set]);
  const fmt=c=>c>=100?("$"+(c/100).toFixed(2)):(c+"¢");
  return {opts:arr.map(fmt),a:arr.indexOf(ans)};
}

 return{q:"Two quarters: the "+pick(TEAMS)+" scored "+a+" then "+b+" points, but "+c+" points were waved off after review. Final total?",...o,topic:"word problems",

function genMath(lvl){
  const g=pick(MATH_GENS[lvl]);
  const q=g();
  q.topic=q.topic||"math";
  // practice = a fresh question of the same kind
  const pr=g();
  q.practice={q:pr.q,opts:pr.opts,a:pr.a};
  q.subject="math";q.level=lvl;
  return q;
}

/* ---------- question selection ---------- */
const ALL_TOPICS=(()=>{const t=new Set();
  for(const s of ["reading","science","history"])for(let l=1;l<=5;l++)BANK[s][l].forEach(q=>t.add(q.topic));
  ["addition","subtraction","multiplication","division","fractions","place value","money","rounding","area","word problems","order of operations"].forEach(x=>t.add(x));
  return [...t];})();

function topicSubject(topic){
  if(["addition","subtraction","multiplication","division","fractions","place value","money","rounding","area","word problems","order of operations","math"].includes(topic))return "math";
  if(ENGLISH_TOPICS.includes(topic))return "english";
  if(["inference","story structure","comprehension","figurative language"].includes(topic))return "comprehension";
  if(["space","animals","human body","how things work"].includes(topic))return "science";
  return "history";
}

function getQuestion(subject,lvl){
  lvl=Math.max(1,Math.min(5,lvl));
  if(subject==="math"){
    // weekly goal weighting for math topics
    const goal=P&&P.weeklyGoal.topic;
    if(goal&&topicSubject(goal)==="math"&&Math.random()<0.5){
      for(let tries=0;tries<8;tries++){const q=genMath(lvl);if(q.topic===goal)return q}
    }
    return genMath(lvl);
  }
  let pool=BANK[subject][lvl].slice();
  const goal=P&&P.weeklyGoal.topic;
  if(goal&&Math.random()<0.5){
    const gp=pool.filter(q=>q.topic===goal);
    if(gp.length)pool=gp;
  }
  // prefer least-recently asked
  pool.sort((x,y)=>{
    const ix="b_"+subject+lvl+"_"+BANK[subject][lvl].indexOf(x), iy="b_"+subject+lvl+"_"+BANK[subject][lvl].indexOf(y);
    return (P.askedAt[ix]||0)-(P.askedAt[iy]||0)||Math.random()-0.5;
  });
  const q=Object.assign({},pool[0]);
  q.id="b_"+subject+lvl+"_"+BANK[subject][lvl].indexOf(pool[0]);
  P.askedAt[q.id]=Date.now();
  q.subject=subject;q.level=lvl;
  return q;
}

/* ---------- SM2 spaced repetition ---------- */
function sm2Update(topic,quality){ // quality 0-5
  if(!P)return;
  const s=P.sm2[topic]||{ef:2.5,int:0,reps:0,due:today(),right:0,wrong:0};
  if(quality>=3){
    s.int=s.reps===0?1:(s.reps===1?6:Math.round(s.int*s.ef));
    s.reps++;s.right++;
  }else{
    s.reps=0;s.int=1;s.wrong++;
  }
  s.ef=Math.max(1.3,s.ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02)));
  s.due=addDays(today(),s.int);
  P.sm2[topic]=s;
}
function topicsDue(){
  if(!P)return[];
  const t=today();
  return Object.entries(P.sm2).filter(([k,v])=>v.due<=t).map(([k])=>k);
}

/* ---------- session ---------- */
function startSession(subject){
  S={subject,total:10,n:0,correct:0,results:[],consecR:0,consecW:0,
     sprintEnd:Date.now()+10*60*1000,qStart:0,cur:null,brokeAt:new Set(),xp:0,mode:"session"};
  say("Let's play "+SUBJECTS[subject].name+"! Take your time and think it through.");

}
function nextQuestion(){
  if(S.n>=S.total)return endSession();
  if(S.n>0&&S.n%5===0&&!S.brokeAt.has(S.n))return brainBreak();
  const lvl=P.levels[S.subject];
  S.cur=getQuestion(S.subject,lvl);
  renderQuestion();
}
function renderQuestion(){
  clearTimers();showAnanseCorner(true);
  const q=S.cur;

  const letters=["A","B","C","D"];
  app.innerHTML='<div class="fadein">'
   +'<div class="hud">'
   +'<span class="pill">'+SUBJECTS[S.subject].icon+' <b>'+SUBJECTS[S.subject].name+'</b></span>'

   +'<span class="lvl-badge">LVL '+q.level+' · '+LEVEL_NAMES[q.level]+'</span>'
   +'</div>'
   +'<div class="dots" style="margin-bottom:16px">'+Array.from({length:S.total},(_,i)=>'<span class="dot '+(i<S.results.length?(S.results[i].correct?"on":"bad"):"")+'"></span>').join("")+'</div>'
   +'<div class="card gold">'
   +'<p class="qtext">'+esc(q.q)+'</p>'
   +'<div class="opts">'+order.map((oi,pos)=>'<button class="opt" id="opt'+pos+'" onclick="answer('+pos+')"><span class="letter">'+letters[pos]+'</span><span>'+esc(q.opts[oi])+'</span></button>').join("")+'</div>'
   +'</div></div>';
  S.qStart=Date.now();
  sprintInt=setInterval(()=>{const el=$("sprint");if(el)el.textContent=fmtTime(S.sprintEnd-Date.now())},250);
  const el=$("sprint");if(el)el.textContent=fmtTime(S.sprintEnd-Date.now());
  say(q.q);
}
function answer(pos){
  const q=S.cur;
  const elapsed=Date.now()-S.qStart;
  if(q.level>1&&elapsed<4000){showStopSign();return}
  const chosen=S.order[pos];
  const correct=chosen===q.a;
  // lock options, show feedback
  S.order.forEach((oi,p)=>{
    const b=$("opt"+p);if(!b)return;
    if(oi===q.a)b.classList.add("correct");
    else if(p===pos&&!correct)b.classList.add("wrong");
    else b.classList.add("dim");
    b.onclick=null;
  });
  S.n++;
  S.results.push({topic:q.topic,correct,level:q.level,ms:elapsed});
  sm2Update(q.topic,correct?(elapsed<15000?5:4):2);
  if(correct){
    S.correct++;S.consecR++;S.consecW=0;
    S.xp+=10*q.level;P.xp+=10*q.level;
    P.streak++;if(P.streak>P.bestStreak)P.bestStreak=P.streak;
    checkStreakTrophy();
    if(S.consecR>=2){if(P.levels[S.subject]<5){P.levels[S.subject]++;toast("⬆️ Level Up! "+LEVEL_NAMES[P.levels[S.subject]]+"!")}S.consecR=0}
  }else{
    S.consecW++;S.consecR=0;P.streak=0;
    P.wrongLog.push({date:today(),topic:q.topic,subject:S.subject});
    if(S.consecW>=2){if(P.levels[S.subject]>1){P.levels[S.subject]--;toast("Let's build it back up — Level "+P.levels[S.subject])}S.consecW=0}
  }
  save();
  const praise=pick(PRAISE);
  if(correct){
    openOverlay('<div class="center"><div class="teach-illus">🎯</div><h2>'+(q.level>=4?"Big-time play!":"Swish!")+'</h2><div class="speech">'+esc(praise)+'</div><div class="spacer"></div><button class="btn big" onclick="closeOverlay();nextQuestion()">Next ▶</button></div>');
    say("Correct! "+praise);
  }else{
    openOverlay('<div class="center"><div class="ananse-wrap">'+ananseSVG(120,"teach")+'</div><div class="speech">'+esc(praise)+'</div><p class="muted" style="margin-top:12px">Now let me show you how this works, step by step.</p><div class="spacer"></div><button class="btn big" onclick="startTeaching()">Teach me, Ananse 🕷️</button></div>');
    say(praise+". Now let me show you how this works, step by step.");
  }
}

/* ---------- speed monitor ---------- */
function showStopSign(){
  openOverlay('<div class="center"><div class="stopsign">STOP</div><h2>Whoa, slow down!</h2><p style="font-size:22px;margin-top:10px">Champions read the WHOLE question first. Take a breath, then try again.</p><div class="spacer"></div><button class="btn big danger" onclick="closeOverlay()">OK, I\'ll slow down</button></div>');
  say("Whoa! Slow down, champion. Read the whole question first, then answer.");
}

/* ---------- Ananse teaching mode ---------- */
let T=null; // teaching state
function startTeaching(){
  T={q:S?S.cur:T.q,step:0,from:"session"};
  T.q=S.cur;
  renderTeachStep();
}
function renderTeachStep(){
  const steps=T.q.teach;
  const st=steps[T.step];
  openOverlay('<div class="center">'
   +'<div class="ananse-wrap">'+ananseSVG(110,"teach")+'</div>'
   +'<div class="teach-illus">'+st.i+'</div>'
   +'<p class="teach-text">'+esc(st.t)+'</p>'
   +'<div class="step-dots">'+steps.map((_,i)=>'<span class="dot '+(i<=T.step?"on":"")+'"></span>').join("")+'</div>'
   +'<button class="btn big" onclick="teachNext()">'+(T.step<steps.length-1?"Tap to continue ▶":"Got it! Let me try one 💪")+'</button>'
   +'</div>');
  say(st.t);
}
function teachNext(){
  if(T.step<T.q.teach.length-1){T.step++;renderTeachStep()}
  else renderPractice();
}
function renderPractice(){
  const pr=T.q.practice;
  if(!pr){closeOverlay();nextQuestion();return}
  const order=shuffle(pr.opts.map((_,i)=>i));
  T.order=order;
  const letters=["A","B","C","D"];
  openOverlay('<div>'
   +'<div class="center"><div class="ananse-wrap">'+ananseSVG(90,"teach")+'</div>'
   +'<div class="speech">Your turn! Try this one with me.</div></div>'
   +'<div class="spacer"></div>'
   +'<p class="qtext" style="font-size:23px">'+esc(pr.q)+'</p>'
   +'<div class="opts">'+order.map((oi,pos)=>'<button class="opt" id="popt'+pos+'" onclick="answerPractice('+pos+')"><span class="letter">'+letters[pos]+'</span><span>'+esc(pr.opts[oi])+'</span></button>').join("")+'</div>'
   +'</div>');
  say("Your turn! "+pr.q);
}
function answerPractice(pos){
  const pr=T.q.practice;
  const chosen=T.order[pos];
  const correct=chosen===pr.a;
  T.order.forEach((oi,p)=>{
    const b=$("popt"+p);if(!b)return;
    if(oi===pr.a)b.classList.add("correct");
    else if(p===pos&&!correct)b.classList.add("wrong");
    else b.classList.add("dim");
    b.onclick=null;
  });
  if(correct&&S){S.xp+=5;P.xp+=5;save()}
  const praise=pick(PRAISE);
  const msg=correct?"You got it! See — your brain was growing the whole time.":"So close! The answer was \""+pr.opts[pr.a]+"\". You worked through every step, and that is what matters.";
  setTimeout(()=>{
    openOverlay('<div class="center"><div class="ananse-wrap">'+ananseSVG(110,correct?"party":"teach")+'</div><div class="speech">'+esc(msg)+'</div><p class="muted" style="margin-top:10px">'+esc(praise)+'</p><div class="spacer"></div><button class="btn big" onclick="closeOverlay();afterTeaching()">Keep going ▶</button></div>');
    say(msg+" "+praise);
  },1200);
}
function afterTeaching(){
  if(T&&T.from==="daily"){finishDaily(false);return}
  if(T&&T.from==="diag"){diagNext();return}
  nextQuestion();
}

/* ---------- brain break ---------- */
let breakInt=null,breakEnd=0;
function brainBreak(){
  clearTimers();
  S.brokeAt.add(S.n);
  const act=pick(BRAIN_BREAKS);
  breakEnd=Date.now()+3*60*1000;
  const started=Date.now();
  openOverlay('<div class="center">'
   +'<h2>🧠 Brain Break!</h2>'
   +'<p class="muted">Your brain grows while your body moves. 3 minutes!</p>'
   +'<div class="teach-illus">'+act.ic+'</div>'
   +'<p class="teach-text">'+esc(act.t)+'</p>'
   +'<div class="break-timer" id="btimer">3:00</div>'
   +'<div class="spacer"></div>'
   +'<button class="btn big" id="breakDone" onclick="endBreak()" disabled>I\'m ready! ▶</button>'
   +'<div class="spacer"></div>'
   +'<button class="btn secondary" id="breakSkip" style="display:none;font-size:15px;padding:8px 16px" onclick="endBreak()">Skip break</button>'
   +'</div>');
  say("Brain break time! "+act.t);
  breakInt=setInterval(()=>{
    const left=breakEnd-Date.now();
    const el=$("btimer");if(el)el.textContent=fmtTime(left);
    if(Date.now()-started>20000){const sk=$("breakSkip");if(sk)sk.style.display="inline-flex"}
    if(left<=0){const b=$("breakDone");if(b)b.disabled=false;const el2=$("btimer");if(el2)el2.textContent="0:00";clearInterval(breakInt);say("Break is done! Ready to keep going?")}
  },300);
}
function endBreak(){
  if(breakInt){clearInterval(breakInt);breakInt=null}
  closeOverlay();
  S.sprintEnd=Date.now()+10*60*1000; // sprint timer resets
  nextQuestion();
}

/* ---------- streak trophies ---------- */
function checkStreakTrophy(){
  const milestones=[5,10,15,20,25,30,40,50];
  if(milestones.includes(P.streak)){
    awardTrophy({type:"streak",icon:"🔥",label:P.streak+" Streak",color:"#ff7a3c",
      detail:"Answered "+P.streak+" questions correctly in a row!",size:Math.min(5,Math.floor(P.streak/10)+1)});
    toast("🔥 "+P.streak+"-streak trophy!");
  }
}
function awardTrophy(t){
  t.date=today();
  P.trophies.push(t);save();
}

/* ---------- session end ---------- */
function endSession(){
  clearTimers();closeOverlay();
  const acc=S.results.length?S.correct/S.results.length:0;
  const lvlAvg=S.results.length?S.results.reduce((a,r)=>a+r.level,0)/S.results.length:1;
  const mins=Math.round((Date.now()-(S.sprintEnd-10*60*1000))/60000);
  P.sessions.push({date:today(),subject:S.subject,correct:S.correct,total:S.results.length,lvlAvg:Math.round(lvlAvg*10)/10,xp:S.xp,t:Date.now()});
  const earned=[];
  const ICONS={math:["🏆","🧮","🔢","📐"],english:["✏️","🖋️","📝","🏆"],comprehension:["📚","📖","📜","🏆"],science:["🪐","🔬","🚀","🏆"],history:["🪘","👑","🪑","🏆"]};
  if(acc>=0.8&&S.results.length>=S.total){
    earned.push({type:"subject",subject:S.subject,icon:pick(ICONS[S.subject]),label:SUBJECTS[S.subject].name+" Star",color:SUBJECTS[S.subject].color,detail:"Scored "+S.correct+"/"+S.results.length+" in a "+SUBJECTS[S.subject].name+" session."});
  }
  if(acc===1&&S.results.length>=S.total){
    earned.push({type:"perfect",icon:"💎",label:"Perfect Session",color:"#9ad8ff",detail:"A flawless "+S.correct+"/"+S.results.length+" in "+SUBJECTS[S.subject].name+"!"});
  }
  if(P.levels[S.subject]===5&&acc>=0.8){
    earned.push({type:"challenge",icon:"🌟",label:"Level 5 Legend",color:"#ffd97a",detail:"Crushed a session at Challenge level in "+SUBJECTS[S.subject].name+"."});
  }
  earned.forEach(awardTrophy);
  save();
  const mood=earned.length?"party":"idle";
  if(earned.length)confetti();
  const praiseLine=acc>=0.8?"You earned every bit of this with focus and effort.":(acc>=0.5?"You worked hard on tough questions today — that effort is building your brain.":"Tough session — but you kept going, and that is what real training looks like. Tomorrow we grow stronger.");
  app.innerHTML='<div class="fadein center">'
   +'<div class="ananse-wrap '+(earned.length?"ananse-celebrate":"")+'">'+ananseSVG(160,mood)+'</div>'
   +'<h1>Session Complete!</h1>'
   +'<div class="speech" style="max-width:480px;margin:14px auto">'+esc(praiseLine)+'</div>'
   +'<div class="spacer"></div>'
   +'<div class="card gold" style="max-width:440px;margin:0 auto;text-align:left">'
   +'<div class="statline"><span>'+SUBJECTS[S.subject].icon+' '+SUBJECTS[S.subject].name+'</span><b>'+S.correct+' / '+S.results.length+'</b></div>'
   +'<div class="statline"><span>⚡ XP earned</span><b>+'+S.xp+'</b></div>'
   +'<div class="statline"><span>🔥 Streak</span><b>'+P.streak+'</b></div>'
   +'<div class="statline" style="border:none"><span>📈 Level now</span><b>'+P.levels[S.subject]+' · '+LEVEL_NAMES[P.levels[S.subject]]+'</b></div>'
   +'</div>'
   +(earned.length?'<div class="spacer"></div><h3>🏆 New trophies!</h3><div class="shelf-row" style="justify-content:center;margin-top:10px">'+earned.map(t=>'<div class="trophy" style="border-color:'+t.color+'"><span class="t-ic">'+t.icon+'</span><span class="t-lb">'+esc(t.label)+'</span></div>').join("")+'</div>':"")
   +'<div class="spacer"></div>'
   +'<div class="btn-row"><button class="btn big" onclick="goHome()">Daily Path 🏠</button>'
   +(earned.length?'<button class="btn secondary big" onclick="renderTrophyRoom()">Trophy Room 🏆</button>':"")
   +'</div></div>';
  say("Session complete! "+praiseLine+(earned.length?" And you earned a new trophy! Go see it in your trophy room.":""));
  S=null;
}
</script>
<script>
"use strict";
/* ============================================================
   DIAGNOSTIC ADVENTURE — first launch only
   ============================================================ */
let D=null;
function startDiagnostic(){
  clearTimers();showAnanseCorner(false);
  const qs=[];
  Object.keys(SUBJECTS).forEach(s=>{
    [1,3,5].forEach(l=>{
      const q=s==="math"?genMath(l):Object.assign({subject:s,level:l},pick(BANK[s][l]));
      q.subject=s;q.level=l;qs.push(q);
    });
  });
  const sc={};Object.keys(SUBJECTS).forEach(s=>sc[s]=0);
  D={qs,i:0,score:sc};
  app.innerHTML='<div class="fadein center" style="max-width:560px;margin:0 auto">'
   +'<div class="ananse-wrap">'+ananseSVG(170,"idle")+'</div>'

   +'<div class="speech">Before our adventures begin, '+esc(P.name)+', walk the Explorer\'s Trail with me! Fifteen fun challenges — no scores, no pressure. They just help me learn how YOU like to think. Some will be easy, some tricky. Just try your best!</div>'
   +'<div class="spacer"></div>'
   +'<button class="btn big" onclick="diagQuestion()">Start the Trail! 🥾</button></div>';

}
function diagQuestion(){
  const q=D.qs[D.i];
  const order=shuffle(q.opts.map((_,i)=>i));
  D.order=order;
  const letters=["A","B","C","D"];
  app.innerHTML='<div class="fadein">'
   +'<div class="hud"><span class="pill">🗺️ Explorer\'s Trail</span><span class="pill">Stone <b>'+(D.i+1)+'</b> of '+D.qs.length+'</span><span class="pill">'+SUBJECTS[q.subject].icon+' '+SUBJECTS[q.subject].name+'</span></div>'
   +'<div class="bar" style="margin-bottom:18px"><i style="width:'+Math.round(D.i/D.qs.length*100)+'%"></i></div>'
   +'<div class="card gold"><p class="qtext">'+esc(q.q)+'</p>'
   +'<div class="opts">'+order.map((oi,pos)=>'<button class="opt" id="dopt'+pos+'" onclick="diagAnswer('+pos+')"><span class="letter">'+letters[pos]+'</span><span>'+esc(q.opts[oi])+'</span></button>').join("")+'</div>'
   +'</div></div>';
  say(q.q);
}
function diagAnswer(pos){
  const q=D.qs[D.i];
  const correct=D.order[pos]===q.a;
  if(correct)D.score[q.subject]++;
  D.order.forEach((oi,p)=>{const b=$("dopt"+p);if(b){b.classList.add(p===pos?(correct?"correct":"dim"):"dim");b.onclick=null}});
  const cheer=correct?pick(["Nice thinking!","You found the path!","Onward, explorer!"]):pick(["Good try — onward!","Tricky stone! Keep walking.","Every step teaches us. Onward!"]);
  toast(cheer);say(cheer);
  setTimeout(diagNext,1100);
}
function diagNext(){
  D.i++;
  if(D.i<D.qs.length)diagQuestion();
  else diagReport();
}
function diagReport(){
  const lvls={},words={};
  Object.keys(D.score).forEach(s=>{
    const c=D.score[s];
    lvls[s]=c>=3?3:(c===2?2:1);
    words[s]=c>=3?"Ready for big challenges right away!":(c===2?"Solid ground — we will build up from grade level.":"We will start gently and grow strong together.");
  });
  P.levels=lvls;P.diagDone=true;P.diag={date:today(),score:D.score};save();
  app.innerHTML='<div class="fadein" style="max-width:620px;margin:0 auto">'
   +'<div class="center"><div class="ananse-wrap ananse-celebrate">'+ananseSVG(140,"party")+'</div>'
   +'<h1>Trail Complete! 🎉</h1>'
   +'<div class="speech">You finished the Explorer\'s Trail, '+esc(P.name)+'! Here is the map of where each adventure begins. Remember — every explorer starts somewhere, and every path leads up!</div></div>'
   +'<div class="spacer"></div>'
   +Object.keys(SUBJECTS).map(s=>'<div class="card" style="margin-bottom:12px"><div class="report-row" style="margin:0"><span class="rn">'+SUBJECTS[s].icon+' '+SUBJECTS[s].name+'</span><div class="bar" style="flex:1"><i style="width:'+(lvls[s]/5*100)+'%"></i></div><span class="lvl-badge">LVL '+lvls[s]+'</span></div><p class="muted" style="margin-top:8px">'+words[s]+'</p></div>').join("")
   +'<div class="center"><div class="spacer"></div><button class="btn big" onclick="goHome()">Start My Adventure! 🚀</button></div></div>';
  say("Trail complete! Here is your adventure map. Every path leads up from here!");
  confetti();
}

/* ============================================================
   DAILY MYSTERY CHALLENGE
   ============================================================ */
let DC=null;
function startDaily(){
  if(P.daily.date===today()&&P.daily.done){
    openOverlay('<div class="center"><div class="teach-illus">🕵️</div><h2>Case closed for today!</h2><p class="muted">A new mystery arrives at midnight. Come back tomorrow, detective!</p><div class="spacer"></div><button class="btn" onclick="closeOverlay()">OK</button></div>');
    say("Case closed for today! A new mystery arrives at midnight.");
    return;
  }
  const q=DAILY_BANK[(dayOfYear()+P.id.length)%DAILY_BANK.length];
  DC={q};
  clearTimers();showAnanseCorner(false);
  const order=shuffle(q.opts.map((_,i)=>i));
  DC.order=order;
  const letters=["A","B","C","D"];
  app.innerHTML='<div class="fadein">'
   +'<div class="center"><h1>🕵️ Daily Mystery Challenge</h1>'
   +'<p class="muted">'+esc(q.mix)+' · one chance per day · special trophy at stake</p>'
   +'<div class="ananse-wrap">'+ananseSVG(110,"teach")+'</div>'
   +'<div class="speech" style="max-width:480px;margin:10px auto">Detective '+esc(P.name)+', this case needs TWO kinds of thinking. Read every clue slowly...</div></div>'
   +'<div class="spacer"></div>'
   +'<div class="card gold"><p class="qtext">'+esc(q.q)+'</p>'
   +'<div class="opts">'+order.map((oi,pos)=>'<button class="opt" id="yopt'+pos+'" onclick="dailyAnswer('+pos+')"><span class="letter">'+letters[pos]+'</span><span>'+esc(q.opts[oi])+'</span></button>').join("")+'</div>'
   +'</div></div>';
  say("Detective "+P.name+", here is today's mystery. "+q.q);
}
function dailyAnswer(pos){
  const q=DC.q;
  const correct=DC.order[pos]===q.a;
  DC.order.forEach((oi,p)=>{const b=$("yopt"+p);if(!b)return;
    if(oi===q.a)b.classList.add("correct");else if(p===pos&&!correct)b.classList.add("wrong");else b.classList.add("dim");b.onclick=null});
  const praise=pick(PRAISE);
  if(correct)setTimeout(()=>finishDaily(true,praise),900);
  else setTimeout(()=>{
    openOverlay('<div class="center"><div class="ananse-wrap">'+ananseSVG(110,"teach")+'</div><div class="speech">'+esc(praise)+'</div><p class="muted" style="margin-top:10px">Every great detective studies the case. Let me walk you through it.</p><div class="spacer"></div><button class="btn big" onclick="dailyTeach()">Show me the clues 🔍</button></div>');
    say(praise+". Let me walk you through the case.");
  },900);
}
function dailyTeach(){
  T={q:DC.q,step:0,from:"daily"};
  T.q.practice=null;
  renderTeachStepDaily();
}
function renderTeachStepDaily(){
  const steps=T.q.teach,st=steps[T.step];
  openOverlay('<div class="center"><div class="ananse-wrap">'+ananseSVG(100,"teach")+'</div>'
   +'<div class="teach-illus">'+st.i+'</div><p class="teach-text">'+esc(st.t)+'</p>'
   +'<div class="step-dots">'+steps.map((_,i)=>'<span class="dot '+(i<=T.step?"on":"")+'"></span>').join("")+'</div>'
   +'<button class="btn big" onclick="dailyTeachNext()">'+(T.step<steps.length-1?"Tap to continue ▶":"Case understood ✔")+'</button></div>');
  say(st.t);
}
function dailyTeachNext(){
  if(T.step<T.q.teach.length-1){T.step++;renderTeachStepDaily()}
  else finishDaily(false);
}
function dailyColor(){const h=(dayOfYear()*47)%360;return "hsl("+h+",75%,60%)"}
function finishDaily(won,praise){
  P.daily={date:today(),done:true,ok:won};
  if(won){
    P.xp+=50;
    awardTrophy({type:"mystery",icon:"🔍",label:"Mystery "+new Date().toLocaleDateString(undefined,{month:"short",day:"numeric"}),color:dailyColor(),detail:"Solved the Daily Mystery: "+DC.q.mix+"."});
    confetti();
  }
  save();
  closeOverlay();
  const msg=won?"CASE SOLVED! You cracked a two-subject mystery. A one-of-a-kind Mystery Trophy is now in your trophy room!":"The case is studied and understood — that is real detective work. A brand new mystery arrives at midnight!";
  app.innerHTML='<div class="fadein center">'
   +'<div class="ananse-wrap '+(won?"ananse-celebrate":"")+'">'+ananseSVG(150,won?"party":"idle")+'</div>'
   +'<h1>'+(won?"🏆 Case Solved!":"🔍 Case Studied")+'</h1>'
   +'<div class="speech" style="max-width:480px;margin:14px auto">'+esc((praise?praise+" ":"")+msg)+'</div>'
   +(won?'<div class="spacer"></div><div class="trophy" style="margin:0 auto;border-color:'+dailyColor()+'"><span class="t-ic">🔍</span><span class="t-lb">Mystery Trophy</span></div>':"")
   +'<div class="spacer"></div><div class="btn-row"><button class="btn big" onclick="goHome()">Daily Path 🏠</button>'
   +(won?'<button class="btn secondary big" onclick="renderTrophyRoom()">Trophy Room 🏆</button>':"")
   +'</div></div>';
  say(msg);
  DC=null;
}

/* ============================================================
   TROPHY ROOM — Prince's space. No Ananse. No narration music.
   ============================================================ */
function renderTrophyRoom(){
  clearTimers();closeOverlay();showAnanseCorner(false);
  if("speechSynthesis" in window)speechSynthesis.cancel();
  const groups=[
    {key:"math",label:"Math",sil:["🧮","🔢"]},
    {key:"english",label:"English",sil:["✏️","📝"]},
    {key:"comprehension",label:"Comprehension",sil:["📚","📜"]},
    {key:"science",label:"Science",sil:["🪐","🚀"]},
    {key:"history",label:"Ghana History",sil:["🪘","👑"]},
    {key:"mystery",label:"Daily Mysteries",sil:["🔍"]},
    {key:"streak",label:"Hot Streaks",sil:["🔥"]},
    {key:"special",label:"Perfect & Legend",sil:["💎","🌟"]}
  ];
  const html=groups.map(g=>{
    let mine;
    if(g.key==="mystery")mine=P.trophies.filter(t=>t.type==="mystery");
    else if(g.key==="streak")mine=P.trophies.filter(t=>t.type==="streak");
    else if(g.key==="special")mine=P.trophies.filter(t=>t.type==="perfect"||t.type==="challenge");
    else mine=P.trophies.filter(t=>t.type==="subject"&&t.subject===g.key);
    const cells=mine.map((t,i)=>{
      const idx=P.trophies.indexOf(t);
      const sz=t.type==="streak"?(34+(t.size||1)*5):40;
      return '<div class="trophy" style="border-color:'+(t.color||"#b9d4f3")+'" onclick="trophyDetail('+idx+')"><span class="t-ic" style="font-size:'+sz+'px">'+t.icon+'</span><span class="t-lb">'+esc(t.label)+'</span></div>';
    }).join("");
    const sils=g.sil.map(s=>'<div class="trophy silhouette"><span class="t-ic">'+s+'</span><span class="t-lb">Not yet...</span></div>').join("");
    return '<div class="shelf"><div class="shelf-label">'+g.label+'</div><div class="shelf-row">'+cells+sils+'</div></div>';
  }).join("");
  app.innerHTML='<div class="fadein">'
   +'<div class="center"><h1>'+esc(P.name)+'\'s Trophy Room</h1>'
   +'<p class="muted">'+P.trophies.length+' trophies earned · your space, your wins</p></div>'
   +'<div class="kente-strip" style="margin:14px 0 20px"></div>'
   +html
   +'<div class="center"><button class="btn secondary" onclick="goHome()">⟵ Back</button></div></div>';
}
function trophyDetail(idx){
  const t=P.trophies[idx];if(!t)return;
  openOverlay('<div class="center"><div class="trophy" style="margin:0 auto;width:120px;height:130px;border-color:'+(t.color||"#e8b549")+'"><span class="t-ic" style="font-size:60px">'+t.icon+'</span></div>'
   +'<h2 style="margin-top:14px">'+esc(t.label)+'</h2>'
   +'<p class="muted">Earned '+esc(t.date)+'</p>'
   +'<p style="margin-top:10px;font-size:20px">'+esc(t.detail||"")+'</p>'
   +'<div class="spacer"></div><button class="btn" onclick="closeOverlay()">Close</button></div>');
}

/* ============================================================
   PLAYER STATS — NBA 2K style card
   ============================================================ */
function subjAccuracy(subj,sinceT,untilT){
  let c=0,t=0;
  P.sessions.forEach(s=>{
    if(subj&&s.subject!==subj)return;
    if(sinceT&&(s.t||0)<sinceT)return;
    if(untilT&&(s.t||0)>=untilT)return;
    c+=s.correct;t+=s.total;
  });
  return t?c/t:null;
}
function pct(x){return x===null?"—":Math.round(x*100)+"%"}
function renderStats(){
  clearTimers();closeOverlay();showAnanseCorner(true);
  const mAcc=subjAccuracy("math"),eAcc=subjAccuracy("english"),cAcc=subjAccuracy("comprehension"),
        sAcc=subjAccuracy("science"),hAcc=subjAccuracy("history");
  const rAcc=(()=>{const v=[eAcc,cAcc].filter(x=>x!==null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null})();
  const all=[mAcc,eAcc,cAcc,sAcc,hAcc].filter(x=>x!==null);
  const avg=all.length?all.reduce((a,b)=>a+b,0)/all.length:null;
  const ovr=avg===null?60:Math.round(60+avg*39);
  const iq=(()=>{const v=[sAcc,hAcc].filter(x=>x!==null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null})();
  const games=P.sessions.length;
  const ppg=games?Math.round(P.sessions.reduce((a,s)=>a+s.xp,0)/games):0;
  const now=Date.now(),wk=7*864e5;
  const thisW=subjAccuracy(null,now-wk),lastW=subjAccuracy(null,now-2*wk,now-wk);
  const gThis=P.sessions.filter(s=>(s.t||0)>=now-wk).length;
  const gLast=P.sessions.filter(s=>(s.t||0)>=now-2*wk&&(s.t||0)<now-wk).length;
  const line=(name,val)=>'<div class="statline"><span>'+name+'</span><span class="statbar"><i style="width:'+(val===null?0:Math.round(val*100))+'%"></i></span><b>'+pct(val)+'</b></div>';
  app.innerHTML='<div class="fadein" style="max-width:560px;margin:0 auto">'
   +'<div class="card2k">'
   +'<div style="display:flex;justify-content:space-between;align-items:center;gap:16px">'
   +'<div><div style="margin-bottom:6px">'+avatarHTML(P,46)+'</div><h2 style="color:#ffffff">'+esc(P.name).toUpperCase()+'</h2><div style="color:#e3ecff;font-size:14px;letter-spacing:2px">LEARNING ZONE · SEASON '+new Date().getFullYear()+'</div></div>'
   +'<div class="center"><div class="ovr">'+ovr+'</div><div class="ovr-lb">OVERALL</div></div>'
   +'</div>'
   +'<div style="height:2px;background:#28405e;margin:16px 0"></div>'
   +line("🏀 Shooting % (Math)",mAcc)
   +line("🎯 Playmaking (English + Comprehension)",rAcc)
   +line("🧠 Basketball IQ (Science + History)",iq)
   +'<div class="statline"><span>🔥 Hot Streak</span><b>'+P.streak+' <span style="font-size:14px;color:#9db4d4">(best '+P.bestStreak+')</span></b></div>'
   +'<div class="statline"><span>🎮 Games Played</span><b>'+games+'</b></div>'
   +'<div class="statline" style="border:none"><span>⚡ Points Per Game (XP)</span><b>'+ppg+'</b></div>'
   +'</div>'
   +'<div class="spacer"></div>'
   +'<div class="card"><h3>📅 Season Stats</h3>'
   +'<div class="statline"><span>This week</span><b>'+gThis+' games · '+pct(thisW)+'</b></div>'
   +'<div class="statline" style="border:none"><span>Last week</span><b>'+gLast+' games · '+pct(lastW)+'</b></div>'
   +(thisW!==null&&lastW!==null?'<p class="muted" style="margin-top:8px">'+(thisW>=lastW?"📈 Trending up — the grind is paying off!":"📊 Last week was hot — time to heat back up!")+'</p>':"")
   +'</div>'
   +'<div class="center"><div class="spacer"></div><button class="btn secondary" onclick="goHome()">⟵ Back</button></div></div>';
}

  const taughtTopics=[...new Set(P.wrongLog.filter(w=>w.date===t).map(w=>w.topic))];
  const taught=taughtTopics.length?taughtTopics.join(", "):"No reteaching needed today";

    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({chat_id:tg.chat,text:buildReport()})
  }).then(r=>r.json()).then(j=>{
    if(j.ok){tg.lastSent=today()+(manual?" (manual)":"");save();toast("Report sent ✓");const el=$("tgStatus");if(el)el.textContent="Last sent: "+tg.lastSent}
    else toast("Telegram error — check token/chat ID");
  }).catch(()=>toast("Could not reach Telegram"));
}
function checkTelegramDue(){
  const tg=DB.telegram;
  if(!tg.token||!tg.chat||!P)return;
  if((tg.lastSent||"").startsWith(today()))return;
  const [h,m]=(tg.time||"19:00").split(":").map(Number);
  const now=new Date();
  if(now.getHours()>h||(now.getHours()===h&&now.getMinutes()>=m))sendTelegram(false);
}

/* ============================================================
   INIT
   ============================================================ */
renderSoundBtn();
/* migrate old saves: reading → english + comprehension, add colors */
(function(){
  let changed=false;
  DB.profiles.forEach(p=>{
    if(p.levels&&p.levels.reading!==undefined){
      p.levels.english=p.levels.english||p.levels.reading||1;
      p.levels.comprehension=p.levels.comprehension||p.levels.reading||1;
      delete p.levels.reading;changed=true;
    }
    Object.keys(SUBJECTS).forEach(s=>{if(p.levels&&!p.levels[s]){p.levels[s]=1;changed=true}});
    if(!p.color){p.color=pick(PCOLORS);changed=true}
    (p.sessions||[]).forEach(se=>{if(se.subject==="reading"){se.subject="comprehension";changed=true}});
    (p.trophies||[]).forEach(t=>{if(t.subject==="reading"){t.subject="comprehension";changed=true}});
  });
  if(changed)save();
})();
renderProfiles();
